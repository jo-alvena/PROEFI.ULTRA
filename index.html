<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PROEFI - ALVENA</title>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body{margin:0;font-family:Arial;background:#21346C;color:white;}
.wrap{max-width:520px;margin:auto;padding:10px;}
.card{background:white;color:#21346C;padding:12px;border-radius:12px;margin-bottom:10px;}
.btn{width:100%;padding:14px;border:none;border-radius:10px;font-weight:bold;margin-top:8px;}
.btnBlue{background:#21346C;color:white;}
.btnGold{background:#BC8A0B;color:white;}
.btnGreen{background:#B9F6CA;}
.btnRed{background:#FFCCCB;}
.menu{
position:fixed;bottom:0;left:0;right:0;
display:flex;background:white;border-top:1px solid #ccc;
}
.menu button{
flex:1;
padding:20px; /* DOBRADO */
font-size:16px;
font-weight:bold;
border:none;background:white;
}
</style>
</head>

<body>
<div class="wrap" id="app">Carregando...</div>

<script>
const firebaseConfig={
apiKey:"AIzaSyAPO-xtmzg0QMvSoDfHd6nRcmrDb7F8n6k",
authDomain:"proefi-alvena.firebaseapp.com",
projectId:"proefi-alvena",
storageBucket:"proefi-alvena.firebasestorage.app",
messagingSenderId:"1084612497727",
appId:"1:1084612497727:web:d9b1de2962cce8123b038a"
};
firebase.initializeApp(firebaseConfig);
const auth=firebase.auth();
const db=firebase.firestore();

let userData=null;
let leadAtual=null;

function $(id){return document.getElementById(id);}
function clean(v){return String(v||"").replace(/\D/g,"");}

function login(){
document.getElementById("app").innerHTML=`
<div class="card">
<h2>PROEFI - ALVENA</h2>
<input id="email" placeholder="email"><br><br>
<input id="senha" type="password" placeholder="senha">
<button class="btn btnGold" onclick="doLogin()">ENTRAR</button>
</div>`;
}
window.doLogin=()=>auth.signInWithEmailAndPassword(email.value,senha.value);

function app(){
app.innerHTML=`
<div id="view"></div>
<div class="menu">
<button onclick="tab('painel')">🏠</button>
<button onclick="tab('atendimento')">☎️</button>
<button onclick="tab('resultados')">📊</button>
<button onclick="tab('config')">⚙️</button>
</div>`;
tab("painel");
}

function tab(t){
if(t==="painel") painel();
if(t==="atendimento") atendimento();
if(t==="resultados") resultados();
if(t==="config") config();
}
window.tab=tab;

function painel(){
view.innerHTML=`
<div class="card">
<h2>Painel</h2>
<button class="btn btnGreen" onclick="setAtivo(true)">ATIVO</button>
<button class="btn btnRed" onclick="setAtivo(false)">PAUSADO</button>
</div>`;
}
window.setAtivo=async v=>{
await db.collection("users").doc(auth.currentUser.uid).update({ativo:v});
};

function atendimento(){
view.innerHTML=`
<div class="card">
<h2>Atendimento</h2>

<select id="fonte">
<option value="geral">Lista Geral</option>
<option value="gerente">Lista Gerente</option>
<option value="minha">Minha Lista</option>
</select>

<button class="btn btnGold" onclick="pegarLead()">PEGAR LEAD</button>

<div id="leadBox"></div>
</div>`;
}

async function pegarLead(){
const snap=await db.collection("leads")
.where("status","==","fila").limit(1).get();

if(snap.empty){leadBox.innerHTML="Sem leads";return;}

const d=snap.docs[0];
leadAtual={id:d.id,...d.data()};

await d.ref.update({status:"em atendimento"});

renderLead();
}

function renderLead(){
const tel=clean(leadAtual.telefone);
const msg=encodeURIComponent(userData.mensagemPadrao||"");

leadBox.innerHTML=`
<h3>${leadAtual.nome}</h3>
<div>${leadAtual.telefone}</div>
<div>${leadAtual.email||""}</div>

<a href="tel:${tel}"><button class="btn btnBlue">📞 LIGAR</button></a>
<a href="https://wa.me/55${tel}?text=${msg}" target="_blank">
<button class="btn btnBlue">💬 WHATSAPP</button></a>
<a href="sms:${tel}?body=${msg}">
<button class="btn btnBlue">📩 SMS</button></a>
<a href="mailto:${leadAtual.email}?subject=PROEFI&body=${msg}">
<button class="btn btnBlue">📧 EMAIL</button></a>

<button class="btn btnGreen" onclick="finalizar('AGENDAMENTO')">FINALIZAR AGENDAMENTO</button>
<button class="btn btnGold" onclick="finalizar('PROMESSA')">FINALIZAR PROMESSA</button>
<button class="btn btnRed" onclick="naoAtendeu()">NÃO ATENDEU</button>
`;
}

window.finalizar=async tipo=>{
await db.collection("leads").doc(leadAtual.id)
.update({status:"finalizado",resultado:tipo});
leadAtual=null;
atendimento();
};

window.naoAtendeu=async ()=>{
await db.collection("leads").doc(leadAtual.id)
.update({status:"fila"});
leadAtual=null;
atendimento();
};

function resultados(){
view.innerHTML=`<div class="card"><h2>Resultados</h2>Mini CRM em breve</div>`;
}

function config(){
view.innerHTML=`
<div class="card">
<h2>Mensagem padrão</h2>
<textarea id="msg" style="width:100%;height:80px">${userData.mensagemPadrao||""}</textarea>
<button class="btn btnBlue" onclick="saveMsg()">SALVAR</button>
</div>

<div class="card">
<h2>Upload Lista</h2>
<input type="file" id="file"/>
<button class="btn btnGold" onclick="upload()">UPLOAD</button>
</div>`;
}

window.saveMsg=async ()=>{
await db.collection("users").doc(auth.currentUser.uid)
.update({mensagemPadrao:msg.value});
alert("salvo");
};

window.upload=async ()=>{
const f=file.files[0];
if(!f)return;
alert("upload pronto (base já criada)");
};

auth.onAuthStateChanged(async u=>{
if(!u){login();return;}
const doc=await db.collection("users").doc(u.uid).get();
userData=doc.data();
app();
});
</script>
</body>
</html>
