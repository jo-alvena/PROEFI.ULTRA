<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>PROEFI - ALVENA ENTERPRISE</title>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
:root{
 --blue:#21346C;
 --gold:#BC8A0B;
 --green:#B9F6CA;
 --red:#FFCCCB;
 --white:#fff;
}
body{margin:0;font-family:Arial;background:var(--blue);color:#fff}
.wrap{max-width:520px;margin:auto;padding:14px}
.card{background:#fff;color:#21346C;border-radius:14px;padding:14px;margin-bottom:12px;box-shadow:0 4px 14px rgba(0,0,0,.15)}
h1{color:var(--gold);margin:0;text-align:center}
.sub{text-align:center;margin-bottom:12px}
input,select,textarea{width:100%;padding:12px;border-radius:10px;border:1px solid #ccc}
.btn{width:100%;padding:14px;border:none;border-radius:12px;font-weight:700;margin-top:8px}
.btnBlue{background:var(--blue);color:#fff}
.btnGold{background:var(--gold);color:#fff}
.btnGreen{background:var(--green)}
.btnRed{background:var(--red)}
.tabs{position:fixed;bottom:0;left:0;right:0;background:#fff;display:flex;gap:6px;padding:8px}
.tab{flex:1;text-align:center;padding:12px;background:#eef2ff;border-radius:10px;font-weight:700;color:#21346C}
.small{font-size:12px;opacity:.8}
</style>
</head>

<body>
<div class="wrap" id="app">Carregando...</div>

<script>
/* ================= FIREBASE ================= */
const firebaseConfig = {
  apiKey: "AIzaSyAPO-xtmzg0QMvSoDfHd6nRcmrDb7F8n6k",
  authDomain: "proefi-alvena.firebaseapp.com",
  projectId: "proefi-alvena",
  storageBucket: "proefi-alvena.firebasestorage.app",
  messagingSenderId: "1084612497727",
  appId: "1:1084612497727:web:d9b1de2962cce8123b038a"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

/* ================= STATE ================= */
let userData=null;
let leadAtual=null;
let focoExtremo=true;
let ultimaAcao=Date.now();

/* ================= HELPERS ================= */
function $(id){return document.getElementById(id);}
function now(){return Date.now();}
function beep(){
  const a=new Audio("https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg");
  a.play().catch(()=>{});
}

/* ================= LOGIN ================= */
function renderLogin(){
 app.innerHTML=`
 <h1>PROEFI - ALVENA</h1>
 <div class="sub">Produção Eficiente • Alvena Soluções Imobiliárias</div>
 <div class="card">
   <input id="email" placeholder="Email">
   <input id="senha" type="password" placeholder="Senha">
   <button class="btn btnGold" onclick="login()">ENTRAR</button>
   <button class="btn btnBlue" onclick="criarConta()">CRIAR ACESSO</button>
 </div>`;
}

async function login(){
 try{
   await auth.signInWithEmailAndPassword(email.value,senha.value);
 }catch(e){alert(e.message);}
}

async function criarConta(){
 try{
   const r=await auth.createUserWithEmailAndPassword(email.value,senha.value);
   await db.collection("users").doc(r.user.uid).set({
     email:email.value,
     nome:"",
     role:"corretor",
     aprovado:false
   });
   alert("Acesso criado. Aguarde aprovação.");
 }catch(e){alert(e.message);}
}

/* ================= DASH ================= */
function renderApp(user){
 app.innerHTML=`
 <h1>PROEFI - ALVENA</h1>
 <div class="sub">${userData.nome||user.email}</div>

 <div class="card">
   <b>Status:</b> ${focoExtremo?"FOCO EXTREMO":"NORMAL"}
   <button class="btn btnBlue" onclick="pegarLead()">PEGAR PRÓXIMO LEAD</button>
 </div>

 <div class="card" id="leadArea">
   Nenhum lead.
 </div>

 <div class="tabs">
   <div class="tab">Painel</div>
   <div class="tab">Atendimento</div>
   <div class="tab">Mini CRM</div>
   <div class="tab">Resultados</div>
   <div class="tab">Config</div>
 </div>`;
}

/* ================= LEADS ================= */
async function pegarLead(){
 if(!userData.aprovado){alert("Aguardando aprovação.");return;}

 const snap=await db.collection("leads")
   .where("status","==","fila")
   .limit(1).get();

 if(snap.empty){leadArea.innerHTML="Sem leads";return;}

 const doc=snap.docs[0];
 leadAtual={id:doc.id,...doc.data()};

 await doc.ref.update({
   status:"em atendimento",
   corretorId:auth.currentUser.uid,
   inicio:now()
 });

 mostrarLead();
}

function mostrarLead(){
 leadArea.innerHTML=`
 <b>${leadAtual.nome||"Sem nome"}</b><br>
 ${leadAtual.telefone||""}<br>
 <button class="btn btnGreen" onclick="atendeu()">ATENDEU</button>
 <button class="btn btnRed" onclick="naoAtendeu()">NÃO ATENDEU</button>`;
}

async function naoAtendeu(){
 if(!leadAtual)return;

 await db.collection("leads").doc(leadAtual.id).update({
   status:"fila",
   ultimoCorretor:auth.currentUser.uid
 });

 leadAtual=null;
 pegarLead(); // automático
}

async function atendeu(){
 if(!leadAtual)return;
 beep();

 await db.collection("leads").doc(leadAtual.id).update({
   status:"finalizado",
   resultado:"ATENDEU",
   fim:now()
 });

 leadArea.innerHTML="Lead finalizado.";
 leadAtual=null;
}

/* ================= AUTH ================= */
auth.onAuthStateChanged(async user=>{
 if(!user){renderLogin();return;}

 const snap=await db.collection("users").doc(user.uid).get();
 if(!snap.exists){renderLogin();return;}

 userData=snap.data();

 if(user.email==="jo.alvenasolucoes@gmail.com"){
   userData.role="diretor";
   userData.aprovado=true;
 }

 if(!userData.aprovado){
   app.innerHTML=`<div class="card">Aguardando aprovação do diretor.</div>`;
   return;
 }

 renderApp(user);
});

/* ================= MODO VENDEDOR ================= */
setInterval(()=>{
 if(now()-ultimaAcao>600000){
   alert("⚡ Vamos voltar ao foco? Seu ranking pode subir agora.");
   ultimaAcao=now();
 }
},60000);

document.addEventListener("click",()=>ultimaAcao=now());

</script>
</body>
</html>
