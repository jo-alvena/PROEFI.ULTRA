<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PROEFI - ALVENA</title>

  <!-- Firebase compat -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

  <style>
    /* =========================================================
       PROEFI - ALVENA
       Paleta:
       #21346C (azul)
       #BC8A0B (dourado)
       #FFFFFF (branco)
       Verde claro: #B9F6CA
       Vermelho claro: #FFCCCB
       ========================================================= */

    :root{
      --blue:#21346C;
      --gold:#BC8A0B;
      --white:#FFFFFF;
      --greenLight:#B9F6CA;
      --redLight:#FFCCCB;

      --cardShadow: 0 10px 24px rgba(0,0,0,0.14);
      --line: rgba(33,52,108,0.14);

      --text: #21346C;
      --muted: rgba(33,52,108,0.72);
      --bg: #21346C;

      --radius: 16px;
      --radius2: 14px;

      --navHeight: 74px;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--white);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .wrap{
      max-width: 920px;
      margin: 0 auto;
      padding: 14px 14px 96px 14px; /* espaço extra pro nav */
    }

    /* ---------- Branding ---------- */
    .brand{
      text-align:center;
      margin: 10px 0 14px 0;
    }
    .brand h1{
      margin:0;
      font-size: 28px;
      letter-spacing: 0.8px;
      color: var(--gold);
      font-weight: 900;
    }
    .brand .sub{
      margin-top:6px;
      line-height: 1.25;
      font-size: 14px;
      opacity: 0.95;
      color: var(--white);
    }

    /* ---------- Cards ---------- */
    .card{
      background: var(--white);
      color: var(--text);
      border-radius: var(--radius);
      padding: 16px;
      box-shadow: var(--cardShadow);
      margin-bottom: 12px;
    }

    .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
    .grow{flex:1}
    .divider{height:1px;background:var(--line);margin:12px 0}
    .small{font-size: 12px}
    .muted{opacity: 0.78}
    .center{text-align:center}
    .danger{color:#b00020;font-weight:900}
    .ok{color:#0b6b2b;font-weight:900}

    .sectionTitle{
      font-weight: 900;
      font-size: 14px;
      margin-bottom: 6px;
    }

    /* ---------- Inputs ---------- */
    input, select, textarea{
      width: 100%;
      padding: 13px 12px;
      border-radius: 12px;
      border: 1px solid rgba(33,52,108,0.22);
      font-size: 16px;
      outline:none;
      background: #fff;
      color: var(--text);
    }
    textarea{min-height: 92px; resize: vertical}

    .fieldLabel{
      font-size: 12px;
      opacity: 0.88;
      margin-bottom: 6px;
      margin-top: 12px;
      font-weight: 900;
      color: var(--text);
    }

    /* ---------- Buttons ---------- */
    .btn{
      width: 100%;
      padding: 14px 12px;
      border:none;
      border-radius: var(--radius2);
      font-size: 16px;
      font-weight: 900;
      cursor:pointer;
      user-select:none;
    }
    .btnGold{ background: var(--gold); color: var(--white); }
    .btnBlue{ background: var(--blue); color: var(--white); }
    .btnGreen{ background: var(--greenLight); color: var(--blue); }
    .btnRed{ background: var(--redLight); color: var(--blue); }
    .btnGhost{
      background: transparent;
      color: var(--blue);
      border: 2px solid rgba(33,52,108,0.25);
    }
    .btnSmall{
      width:auto;
      padding: 10px 12px;
      border-radius: 12px;
      font-size: 14px;
    }
    .btn:disabled{ opacity: 0.5; cursor:not-allowed; }

    /* ---------- Pills ---------- */
    .pill{
      display:inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 900;
      background: rgba(188,138,11,0.14);
      color: var(--blue);
      white-space: nowrap;
    }
    .pillRed{ background: rgba(255,204,203,0.76); }
    .pillGreen{ background: rgba(185,246,202,0.80); }
    .pillBlue{ background: rgba(33,52,108,0.10); }

    /* ---------- Grids ---------- */
    .grid2{display:grid;grid-template-columns: 1fr 1fr;gap:10px}
    .grid3{display:grid;grid-template-columns: 1fr 1fr 1fr;gap:10px}
    .grid4{display:grid;grid-template-columns: 1fr 1fr 1fr 1fr;gap:10px}
    @media(max-width:520px){
      .grid3{grid-template-columns: 1fr}
      .grid4{grid-template-columns: 1fr 1fr}
    }

    a{text-decoration:none}

    /* ---------- Tables ---------- */
    table{width:100%;border-collapse:collapse}
    th, td{
      border-bottom: 1px solid rgba(33,52,108,0.12);
      padding: 10px 8px;
      font-size: 12px;
      text-align:left;
      vertical-align: top;
      color: var(--text);
    }
    th{font-weight: 900;}

    /* ---------- Bottom Nav (mais bonito e maior) ---------- */
    .navBottom{
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      height: var(--navHeight);
      background: #ffffff;
      border-top: 1px solid rgba(33,52,108,0.12);
      box-shadow: 0 -10px 20px rgba(0,0,0,0.10);
      display: flex;
      justify-content: center;
      z-index: 9999;
    }
    .navBottomInner{
      width: min(920px, 100%);
      display: grid;
      gap: 6px;
      padding: 8px 10px;
      align-items: center;
    }
    .nav5{ grid-template-columns: repeat(5, 1fr); }
    .nav4{ grid-template-columns: repeat(4, 1fr); }

    .navItem{
      border-radius: 14px;
      padding: 8px 8px;
      text-align: center;
      cursor: pointer;
      user-select: none;
      color: rgba(33,52,108,0.72);
      font-weight: 900;
      font-size: 13px;
      display: grid;
      gap: 4px;
      align-content: center;
      border: 2px solid rgba(33,52,108,0.12);
    }
    .navItem .ico{
      font-size: 22px;
      line-height: 1;
    }
    .navItem.active{
      background: rgba(33,52,108,0.10);
      border: 2px solid rgba(33,52,108,0.24);
      color: var(--blue);
    }
    .navItem:active{
      transform: scale(0.99);
    }

    /* ---------- Small helpers ---------- */
    .tag{
      display:inline-block;
      padding: 5px 8px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 900;
      background: rgba(33,52,108,0.08);
      color: var(--blue);
      margin-right: 6px;
      margin-top: 6px;
    }

    .hrSpace{ height: 10px; }

    /* ---------- Login styling ---------- */
    .loginCard{
      background: var(--white);
      color: var(--text);
      border-radius: var(--radius);
      padding: 16px;
      box-shadow: var(--cardShadow);
    }
    .loginInputGold{
      border: 2px solid var(--gold) !important;
    }

    .toggleBox{

      border-radius: 14px;
      padding: 12px;
      margin-top: 10px;
      background: rgba(33,52,108,0.02);
    }
  </style>
</head>

<script>

   CONFIG

/* =========================

let STATE = {

/* =========================
   HELPERS
   ========================= */
function $(id){ return document.getElementById(id); }
function nowMs(){ return Date.now(); }

function dayKey(ts){
  const d = new Date(ts);
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const da = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${da}`;
}

function cleanPhone(raw){ return String(raw || "").replace(/\D/g,''); }

function templateMessage(msg, lead){
  const nome = lead?.nome || "";
  const tel  = lead?.telefone || "";
  const em   = lead?.email || "";
  return String(msg || "")
    .replaceAll("{{nome}}", nome)
    .replaceAll("{{telefone}}", tel)
    .replaceAll("{{email}}", em);
}

function isDiretorEmail(email){
  return String(email||"").toLowerCase() === String(DIRETOR_EMAIL_FIXO).toLowerCase();
}

function normalizeRole(r){
  return String(r||"").toLowerCase().trim();
}

function isApproved(userData){
  const st = String(userData?.status || "").toLowerCase().trim();
  if (userData?.aprovado === true) return true;
  if (userData?.approved === true) return true;
  if (st === "aprovado" || st === "approved") return true;
  return false;
}

function safeText(s){
  return String(s ?? "").replace(/[<>]/g,"");
}

/* =========================
   USER DOC
   ========================= */
async function getUserDoc(uid){
  const snap = await db.collection("users").doc(uid).get();
  return snap.exists ? (snap.data() || null) : null;
}

async function ensureDiretorDoc(user){
  const ref = db.collection("users").doc(user.uid);
  const snap = await ref.get();

  const base = {
    email: user.email,
    nome: user.displayName || "Diretor",
    role: "diretor",
    status: "aprovado",
    aprovado: true,
    equipe: "DIRETORIA",
    ativo: false,
    atualizadoEm: nowMs()
  };

  if(!snap.exists){
    await ref.set({ ...base, criadoEm: nowMs() });
  }else{
    await ref.update(base);
  }
}

async function createPendingUserDoc(user){
  const ref = db.collection("users").doc(user.uid);
  const snap = await ref.get();
  if(snap.exists) return;

  await ref.set({
    email: user.email,
    nome: user.displayName || "",
    role: "corretor",
    status: "pendente",
    aprovado: false,
    equipe: null,
    ativo: false,
    criadoEm: nowMs(),
    atualizadoEm: nowMs(),
    mensagemPadrao: "Olá {{nome}}, aqui é da equipe Alvena. Estou tentando falar com você sobre seu interesse."
  });
}

/* =========================
   STATS DIÁRIOS
   - docId: `${day}__${uid}`
   ========================= */
function statsDocIdFor(uid){
  const day = dayKey(nowMs());
  return `${day}__${uid}`;
}

async function incStats(uid, patch){
  const id = statsDocIdFor(uid);
  const ref = db.collection("stats_diarios").doc(id);
  const day = dayKey(nowMs());

  const base = {
    uid,
    day,
    atualizadoEm: nowMs()
  };

  const data = {};
  for(const k of Object.keys(patch)){
    data[k] = firebase.firestore.FieldValue.increment(patch[k]);
  }

  await ref.set({ ...base, ...data }, { merge:true });
}

/* =========================
   UI RENDER HELPERS
   ========================= */
function renderBrand(){

}

  if(STATE.session.role === "corretor"){

  }else if(STATE.session.role === "gerente"){

/* =========================
   BOTTOM NAV
   ========================= */
function renderNav(){
  const navRoot = $("navRoot");
  if(!navRoot) return;

  // Diretor: 5 tabs: Painel, Aprovações, Mini CRM, Resultados, Config
  // Gerente: 4 tabs: Painel, Mini CRM, Resultados, Config
  // Corretor: 5 tabs: Painel, Atendimento, Mini CRM, Resultados, Config

  let items = [];
  let cls = "";

  if(STATE.session.role === "diretor"){
    cls = "nav5";
    items = [
      { id:"painel", label:"Painel", ico:"🏠" },
      { id:"aprovacoes", label:"Aprovar", ico:"✅" },
      { id:"mini", label:"Mini CRM", ico:"📌" },
      { id:"resultados", label:"Resultados", ico:"📊" },
      { id:"config", label:"Config", ico:"⚙️" },
    ];
  }else if(STATE.session.role === "gerente"){
    cls = "nav4";
    items = [
      { id:"painel", label:"Painel", ico:"🏠" },
      { id:"mini", label:"Mini CRM", ico:"📌" },
      { id:"resultados", label:"Resultados", ico:"📊" },
      { id:"config", label:"Config", ico:"⚙️" },
    ];
  }else if(STATE.session.role === "corretor"){
    cls = "nav5";
    items = [
      { id:"painel", label:"Painel", ico:"🏠" },
      { id:"atendimento", label:"Atendimento", ico:"📞" },
      { id:"mini", label:"Mini CRM", ico:"📌" },
      { id:"resultados", label:"Resultados", ico:"📊" },
      { id:"config", label:"Config", ico:"⚙️" },
    ];
  }else{
    navRoot.innerHTML = "";
    return;
  }

  navRoot.innerHTML = `
    <div class="navBottom">
      <div class="navBottomInner ${cls}">
        ${items.map(it => `
          <div class="navItem ${STATE.ui.tab===it.id ? "active":""}" onclick="goTab('${it.id}')">
            <div class="ico">${it.ico}</div>
            <div>${it.label}</div>
          </div>
        `).join("")}
      </div>
    </div>
  `;
}

window.goTab = function(tab){
  // bloqueios por role
  if(STATE.session.role === "gerente" && tab === "atendimento") return;
  if(STATE.session.role !== "diretor" && tab === "aprovacoes") return;

  STATE.ui.tab = tab;

  // render
  renderApp();
}

window.doLogin = async function(){
  const email = ($("email")?.value || "").trim();
  const senha = ($("senha")?.value || "").trim();
  if(!email || !senha) return alert("Preencha email e senha.");
  try{
    await auth.signInWithEmailAndPassword(email, senha);
  }catch(e){
    alert(e.message || String(e));
  }
};

window.criarConta = async function(){
  const email = ($("emailNovo")?.value || "").trim();
  const senha = ($("senhaNova")?.value || "").trim();
  if(!email || !senha) return alert("Preencha email e senha do novo acesso.");
  try{
    const cred = await auth.createUserWithEmailAndPassword(email, senha);
    await createPendingUserDoc(cred.user);
    renderPendingApproval();
  }catch(e){
    alert(e.message || String(e));
  }
};

window.doLogout = async function(){
  try{ await auth.signOut(); }catch(e){}

/* =========================
   ATIVO / PAUSADO (corretor)
   ========================= */
async function setActiveStatus(uid, ativo){
  await db.collection("users").doc(uid).update({
    ativo: !!ativo,
    ativoAtualizadoEm: nowMs()
  });
  STATE.session.ativo = !!ativo;

/* =========================
   XLS IMPORT
   ========================= */
function parseSheetRows(workbook){
  const sheetName = workbook.SheetNames[0];
  const ws = workbook.Sheets[sheetName];
  const rows = XLSX.utils.sheet_to_json(ws, { header: 1, raw: false, defval: "" });
  const clean = rows.filter(r => r && r.some(cell => String(cell).trim() !== ""));
  return clean;
}

function detectHeaderRow(rows){
  const keys = ["nome","telefone","celular","contato","email","e-mail"];
  for(let i=0;i<Math.min(5, rows.length);i++){
    const row = rows[i].map(c=>String(c).toLowerCase().trim());
    const hit = row.some(c => keys.includes(c));
    if(hit) return i;
  }
  return 0;
}

function mapLeadColumns(row){
  // padrão: A Nome, B Telefone, C Email
  const nome = String(row[0] || "").trim();
  const telefone = String(row[1] || "").trim();
  const email = String(row[2] || "").trim();
  return { nome, telefone, email };
}

function makeLeadDoc(base){
  return {
    nome: base.nome || "",
    telefone: base.telefone || "",
    email: base.email || "",

    status: "fila",                 // fila | em atendimento | finalizado
    corretorId: null,

    criadoEm: nowMs(),
    atualizadoEm: nowMs(),

    emAtendimentoEm: null,
    timestampDistribuicao: null,
    timestampFinalizacao: null,

    atendeu: null,
    resultado: null,
    observacao: null,
    dataAgendada: null,

    totalTentativas: 0,

    origem: null,                   // geral | gerente | corretor
    equipe: null,                   // equipe1...
    donoUpload: null,               // uid
    listaRef: null,                 // id da lista

    deleted: false,                 // soft delete p/ Mini CRM
    deletedEm: null,
    deletedPor: null,
  };
}

async function uploadLeadsFromFile({ file, origem, equipe, donoUploadUid, distribuirGeralAgora }){
  const arrayBuffer = await file.arrayBuffer();
  const workbook = XLSX.read(arrayBuffer, { type: "array" });
  const rows = parseSheetRows(workbook);
  if(rows.length === 0) throw new Error("Planilha vazia.");

  const headerIndex = detectHeaderRow(rows);
  const dataRows = rows.slice(headerIndex + 1);

  const parsed = [];
  for(const r of dataRows){
    const lead = mapLeadColumns(r);
    if(!lead.nome && !lead.telefone && !lead.email) continue;
    if(!lead.telefone) continue;
    parsed.push(lead);
  }
  if(parsed.length === 0) throw new Error("Nenhum lead válido (verifique colunas A/B/C).");

  const listaDoc = await db.collection("listas").add({
    origem,
    equipe: equipe || null,
    donoUpload: donoUploadUid,
    arquivoNome: file.name,
    total: parsed.length,
    criadoEm: nowMs()
  });

  const listaRefId = listaDoc.id;

  // distribuição aleatória no upload (lista geral)
  let corretoresAtivos = [];
  if(origem === "geral" && distribuirGeralAgora){
    const snap = await db.collection("users")
      .where("role","==","corretor")
      .where("ativo","==",true)
      .get();
    corretoresAtivos = snap.docs.map(d => ({ uid: d.id, ...(d.data()||{}) }))
      .filter(u => isApproved(u) && u.ativo === true);

    if(corretoresAtivos.length === 0){
      throw new Error("Nenhum corretor ATIVO no momento. Peça para os corretores clicarem 'ESTOU ATIVO' antes do upload da lista geral.");
    }
  }

  const batchSize = 350;
  let idx = 0;

  while(idx < parsed.length){
    const batch = db.batch();
    const slice = parsed.slice(idx, idx + batchSize);

    for(const leadBase of slice){
      const docRef = db.collection("leads").doc();
      const doc = makeLeadDoc(leadBase);

      doc.origem = origem;
      doc.equipe = equipe || null;
      doc.donoUpload = donoUploadUid;
      doc.listaRef = listaRefId;

      if(origem === "geral" && distribuirGeralAgora){
        const chosen = corretoresAtivos[Math.floor(Math.random()*corretoresAtivos.length)];
        doc.corretorId = chosen.uid;
        doc.status = "fila";
      }

      batch.set(docRef, doc);
    }

    await batch.commit();
    idx += batchSize;
  }

  return { total: parsed.length, listaRefId };
}

/* =========================
   PICK NEXT LEAD (aleatório, evita repetição imediata)
   ========================= */
async function pickNextLeadForCorretor({ source, corretorUid, equipeCorretor, avoidLeadId }){
  let q = db.collection("leads")
    .where("status","==","fila")
    .where("deleted","==",false);

  if(source === "geral"){
    q = q.where("origem","==","geral").where("corretorId","==",corretorUid);
  }else if(source === "gerente"){
    q = q.where("origem","==","gerente").where("equipe","==",equipeCorretor).where("corretorId","==",null);
  }else{
    q = q.where("origem","==","corretor").where("donoUpload","==",corretorUid).where("corretorId","==",null);
  }

  const snap = await q.limit(12).get();
  if(snap.empty) return null;

  const docs = snap.docs.slice().sort(()=>Math.random()-0.5);
  let chosen = docs.find(d => d.id !== avoidLeadId) || docs[0];

  const ref = chosen.ref;

  await ref.update({
    status: "em atendimento",
    corretorId: corretorUid,
    emAtendimentoEm: nowMs(),
    timestampDistribuicao: nowMs(),
    atualizadoEm: nowMs(),
    totalTentativas: firebase.firestore.FieldValue.increment(1)
  });

  const fresh = await ref.get();
  return { ref, data: fresh.data(), id: fresh.id };
}

/* =========================
   AUTO TIMEOUT (20 min)
   - Melhor esforço: se passar, devolve pra fila e limpa tela
   ========================= */
async function enforceLeadTimeout(){
  try{
    if(STATE.session.role !== "corretor") return;
    if(!STATE.session.uid) return;
    if(!STATE.lead.atualRef || !STATE.lead.atualData) return;

    const start = STATE.lead.atualData.timestampDistribuicao || STATE.lead.atualData.emAtendimentoEm;
    if(!start) return;

    const elapsedMin = (nowMs() - start) / 60000;
    if(elapsedMin < LEAD_TIMEOUT_MIN) return;

    // devolve automaticamente para fila
    const userUid = STATE.session.uid;
    const leadData = STATE.lead.atualData;

    await STATE.lead.atualRef.update({
      status: "fila",
      corretorId: (leadData.origem === "geral") ? userUid : null,
      emAtendimentoEm: null,
      timestampDistribuicao: null,
      atualizadoEm: nowMs(),
      atendeu: false,
      resultado: null,
      observacao: null,
      dataAgendada: null
    });

    // contabiliza como "nao_atendeu_auto"
    await incStats(userUid, { nao_atendeu_auto: 1 });

    // limpa lead atual
    STATE.lead.lastLeadId = STATE.lead.atualId;
    STATE.lead.atualRef = null;
    STATE.lead.atualData = null;
    STATE.lead.atualId = null;
    STATE.lead.detailsOpen = false;

    // avisa e volta pra tela de atendimento
    if(STATE.ui.tab === "atendimento"){
      alert("Tempo máximo excedido (20 min). Lead devolvido para fila automaticamente.");
      renderAtendimento();
    }
  }catch(e){
    // silencioso
  }
}

/* =========================

   ========================= */
window.pegarProximoLead = async function(){
  if(STATE.session.role !== "corretor") return;

  if(STATE.lead.atualRef){
    return alert("Você já está com um lead em atendimento. Finalize/devolva antes de pegar outro.");
  }

  if(STATE.session.ativo !== true){
    return alert("Você está PAUSADO. Clique em 'ESTOU ATIVO' para pegar lead.");
  }

  const picked = await pickNextLeadForCorretor({
    source: STATE.lead.source,
    corretorUid: STATE.session.uid,
    equipeCorretor: STATE.session.equipe || "equipe1",
    avoidLeadId: STATE.lead.lastLeadId
  });

  if(!picked){
    alert("Sem leads disponíveis nessa fonte.");
    return;
  }

  STATE.lead.atualRef = picked.ref;
  STATE.lead.atualData = picked.data;
  STATE.lead.atualId = picked.id;
  STATE.lead.detailsOpen = false;
  STATE.lead.lastLeadId = picked.id;

  await incStats(STATE.session.uid, { tentativas: 1 });

  if(STATE.ui.tab !== "atendimento") STATE.ui.tab = "atendimento";
  renderApp();
  await renderLeadArea();
};

/* =========================
   NÃO ATENDEU:
   - devolve pra fila
   - pega outro automaticamente
   ========================= */
window.uiNaoAtendeu = async function(){
  if(!STATE.lead.atualRef) return;

  const lead = STATE.lead.atualData;
  const uid = STATE.session.uid;

  // devolve lead
  await STATE.lead.atualRef.update({
    status: "fila",
    corretorId: (lead.origem === "geral") ? uid : null,
    emAtendimentoEm: null,
    timestampDistribuicao: null,
    atualizadoEm: nowMs(),
    atendeu: false,
    resultado: null,
    observacao: null,
    dataAgendada: null
  });

  await incStats(uid, { nao_atendeu: 1 });

  // evita repetir
  STATE.lead.lastLeadId = STATE.lead.atualId;

  // limpa
  STATE.lead.atualRef = null;
  STATE.lead.atualData = null;
  STATE.lead.atualId = null;
  STATE.lead.detailsOpen = false;

  // pega outro
  const picked = await pickNextLeadForCorretor({
    source: STATE.lead.source,
    corretorUid: uid,
    equipeCorretor: STATE.session.equipe || "equipe1",
    avoidLeadId: STATE.lead.lastLeadId
  });

  if(!picked){
    // sem outros
    renderAtendimento();
    const area = $("leadArea");
    if(area) area.innerHTML = `<div class="center muted">Lead devolvido. Sem outros leads disponíveis agora.</div>`;
    return;
  }

  STATE.lead.atualRef = picked.ref;
  STATE.lead.atualData = picked.data;
  STATE.lead.atualId = picked.id;
  STATE.lead.detailsOpen = false;
  STATE.lead.lastLeadId = picked.id;

  await incStats(uid, { tentativas: 1 });

  await renderLeadArea();
};

   ========================= */
window.confirmarAtendeu = async function(resultado){
  if(!STATE.lead.atualRef) return;

  let dataAgendada = null;
  let obs = null;

  if(resultado === "AGENDAMENTO"){
    const d = ($("agData")?.value || "").trim();
    const h = ($("agHora")?.value || "").trim();
    if(!d || !h) return alert("Preencha data e horário do agendamento.");
    dataAgendada = `${d} ${h}`;
    obs = ($("obsAg")?.value || "").trim();
  }else if(resultado === "PROMESSA DOCUMENTAÇÃO"){
    obs = ($("obsPr")?.value || "").trim();
  }else{
    const fb = ($("fbText")?.value || "").trim();
    if(!fb) return alert("Feedback é obrigatório.");
    obs = fb;
  }

  await STATE.lead.atualRef.update({
    status: "finalizado",
    atendeu: true,
    resultado,
    observacao: obs || null,
    dataAgendada: dataAgendada,
    timestampFinalizacao: nowMs(),
    atualizadoEm: nowMs()
  });

  // stats
  await incStats(STATE.session.uid, { atendidos: 1 });
  if(resultado === "AGENDAMENTO") await incStats(STATE.session.uid, { agendamentos: 1 });
  if(resultado === "PROMESSA DOCUMENTAÇÃO") await incStats(STATE.session.uid, { promessas: 1 });
  if(resultado === "NÃO GEROU INTERESSE") await incStats(STATE.session.uid, { sem_interesse: 1 });

  // finaliza e limpa
  STATE.lead.atualRef = null;
  STATE.lead.atualData = null;
  STATE.lead.atualId = null;
  STATE.lead.detailsOpen = false;

  renderAtendimento();
  const area = $("leadArea");
  if(area) area.innerHTML = `<div class="center ok">Atendimento finalizado!</div>`;
};

  `;

window.loadMiniCRM = async function(){
  const box = $("miniCrmList");
  if(!box) return;

  const today = dayKey(nowMs());
  box.innerHTML = `Carregando...`;

  // Query base
  let q = db.collection("leads")
    .where("status","==","finalizado")
    .where("deleted","==",false);

  // filtro por perfil
  if(STATE.session.role === "corretor"){
    q = q.where("corretorId","==",STATE.session.uid);
  }else if(STATE.session.role === "gerente"){
    // gerente: filtra por equipe
    q = q.where("equipe","==",STATE.session.equipe || "equipe1");
  }else{
    // diretor: tudo
  }

  // Limitamos para não explodir
  const snap = await q.limit(300).get();
  const rows = [];

  snap.forEach(ds=>{
    const d = ds.data() || {};
    if(!d.timestampFinalizacao) return;
    if(dayKey(d.timestampFinalizacao) !== today) return;
    if(!(d.resultado === "AGENDAMENTO" || d.resultado === "PROMESSA DOCUMENTAÇÃO")) return;

    rows.push({
      id: ds.id,
      nome: d.nome || "",
      telefone: d.telefone || "",
      email: d.email || "",
      resultado: d.resultado || "",
      dataAgendada: d.dataAgendada || "",
      observacao: d.observacao || "",
      corretorId: d.corretorId || "",
      equipe: d.equipe || "",
    });
  });

  if(rows.length === 0){
    box.innerHTML = `<div class="muted">Sem registros hoje.</div>`;
    return;
  }

  // render cards list
  box.innerHTML = rows.map(r => `
    <div class="toggleBox">
      <div><b>${safeText(r.nome)}</b></div>
      <div class="small muted">${safeText(r.telefone)} • ${safeText(r.email)}</div>
      <div class="small muted">
        <span class="tag">${safeText(r.resultado)}</span>
        ${r.dataAgendada ? `<span class="tag">📅 ${safeText(r.dataAgendada)}</span>` : ``}
        ${r.equipe ? `<span class="tag">Equipe: ${safeText(r.equipe)}</span>` : ``}
      </div>
      <div class="divider"></div>

      <div class="fieldLabel">Alterar Resultado</div>
      <select id="res_${r.id}">
        <option value="AGENDAMENTO" ${r.resultado==="AGENDAMENTO"?"selected":""}>AGENDAMENTO</option>
        <option value="PROMESSA DOCUMENTAÇÃO" ${r.resultado==="PROMESSA DOCUMENTAÇÃO"?"selected":""}>PROMESSA DOCUMENTAÇÃO</option>
      </select>

      <div class="fieldLabel">Data/Hora (apenas se agendamento)</div>
      <input id="dh_${r.id}" placeholder="YYYY-MM-DD HH:MM" value="${safeText(r.dataAgendada)}"/>

      <div class="fieldLabel">Observação</div>
      <textarea id="ob_${r.id}">${safeText(r.observacao)}</textarea>

      <div class="divider"></div>
      <div class="grid2">
        <button class="btn btnGreen" onclick="miniSave('${r.id}')">SALVAR</button>
        <button class="btn btnRed" onclick="miniDelete('${r.id}')">EXCLUIR</button>
      </div>
    </div>
  `).join("");
};

window.miniSave = async function(leadId){
  const res = ($(`res_${leadId}`)?.value || "").trim();
  const dh  = ($(`dh_${leadId}`)?.value || "").trim();
  const ob  = ($(`ob_${leadId}`)?.value || "").trim();

  if(res === "AGENDAMENTO"){
    if(!dh) return alert("Para AGENDAMENTO, preencha Data/Hora.");
  }

  const ref = db.collection("leads").doc(leadId);
  await ref.update({
    resultado: res,
    dataAgendada: (res === "AGENDAMENTO") ? dh : null,
    observacao: ob || null,
    atualizadoEm: nowMs()
  });

  alert("Atualizado!");
  loadMiniCRM();
};

window.miniDelete = async function(leadId){
  if(!confirm("Confirma excluir este lead do Mini CRM? (Soft delete)")) return;

  const ref = db.collection("leads").doc(leadId);
  await ref.update({
    deleted: true,
    deletedEm: nowMs(),
    deletedPor: STATE.session.uid,
    atualizadoEm: nowMs()
  });

  alert("Excluído!");
  loadMiniCRM();
};

   TABS: RESULTADOS (Ranking)
   - Usa stats_diarios do dia
   - Corretor: vê seus números + ranking da equipe
   - Gerente: ranking corretores da equipe + total equipe
   - Diretor: ranking gerentes (por equipe) + total geral (estimado)
   ========================= */
function renderResultados(){
  const app = $("app");
  let html = `${renderHeaderCard()}`;

  html += `
    <div class="card">
      <div class="sectionTitle">Resultados (Dia: ${dayKey(nowMs())})</div>
      <div class="small muted">
        Ranking e totals baseados em <b>stats_diarios</b> (tentativas, atendidos, agendamentos, promessas).
      </div>
      <div class="divider"></div>
      <button class="btn btnGold" onclick="loadResultados()">ATUALIZAR RESULTADOS</button>
      <div class="hrSpace"></div>
      <div id="resultBox" class="small muted">Carregando...</div>
    </div>
  `;

  app.innerHTML = html;
  loadResultados();
}

window.loadResultados = async function(){
  const box = $("resultBox");
  if(!box) return;

  const today = dayKey(nowMs());

  // carrega stats do dia
  const snap = await db.collection("stats_diarios").where("day","==",today).get();
  const stats = snap.docs.map(d => ({ id: d.id, ...(d.data()||{}) }));

  // carrega users para mapear equipe/role/email
  const usnap = await db.collection("users").get();
  const users = usnap.docs.map(d => ({ uid: d.id, ...(d.data()||{}) }));

  const uByUid = {};
  users.forEach(u => { uByUid[u.uid] = u; });

  // helper: pega label user
  function userLabel(uid){
    const u = uByUid[uid] || {};
    return (u.email || uid || "").toString();
  }

  // monta linhas por corretor
  const rowsCorretor = stats.map(s => {
    const u = uByUid[s.uid] || {};
    const role = normalizeRole(u.role);
    return {
      uid: s.uid,
      email: u.email || "",
      role: role || "",
      equipe: u.equipe || "",
      tentativas: s.tentativas || 0,
      atendidos: s.atendidos || 0,
      agendamentos: s.agendamentos || 0,
      promessas: s.promessas || 0,
      sem_interesse: s.sem_interesse || 0,
      nao_atendeu: s.nao_atendeu || 0,
      score: (s.agendamentos||0)*3 + (s.promessas||0)*2 + (s.atendidos||0)*1
    };
  });

  // filtros por role
  const corretores = rowsCorretor.filter(r => r.role === "corretor");
  const gerentes   = users.filter(u => normalizeRole(u.role)==="gerente");

  if(STATE.session.role === "corretor"){
    const equipe = STATE.session.equipe || "";
    const teamRows = corretores.filter(r => r.equipe === equipe);

    // ranking
    teamRows.sort((a,b)=> b.score - a.score || b.atendidos - a.atendidos || (a.email||"").localeCompare(b.email||""));

    const my = corretores.find(r => r.uid === STATE.session.uid) || {
      tentativas:0, atendidos:0, agendamentos:0, promessas:0, sem_interesse:0, nao_atendeu:0, score:0
    };

    box.innerHTML = `
      <div class="sectionTitle">Seu resumo</div>
      <div class="small muted">
        <span class="tag">Tentativas: ${my.tentativas}</span>
        <span class="tag">Atendidos: ${my.atendidos}</span>
        <span class="tag">Agend.: ${my.agendamentos}</span>
        <span class="tag">Promessas: ${my.promessas}</span>
        <span class="tag">Score: ${my.score}</span>
      </div>
      <div class="divider"></div>

      <div class="sectionTitle">Ranking da equipe (${safeText(equipe || "-")})</div>
      <table>
        <thead>
          <tr>
            <th>#</th><th>Corretor</th><th>Tent.</th><th>Atend.</th><th>Ag.</th><th>Prom.</th><th>Score</th>
          </tr>
        </thead>
        <tbody>
          ${teamRows.length ? teamRows.map((r,i)=>`
            <tr>
              <td>${i+1}</td>
              <td>${safeText(r.email || r.uid)}</td>
              <td>${r.tentativas}</td>
              <td>${r.atendidos}</td>
              <td>${r.agendamentos}</td>
              <td>${r.promessas}</td>
              <td><b>${r.score}</b></td>
            </tr>
          `).join("") : `<tr><td colspan="7" class="muted">Sem dados na equipe hoje.</td></tr>`}
        </tbody>
      </table>
    `;
    return;
  }

  if(STATE.session.role === "gerente"){
    const equipe = STATE.session.equipe || "";
    const teamRows = corretores.filter(r => r.equipe === equipe);

    teamRows.sort((a,b)=> b.score - a.score || b.atendidos - a.atendidos || (a.email||"").localeCompare(b.email||""));

    // total equipe
    const total = teamRows.reduce((acc,r)=> {
      acc.tentativas += r.tentativas;
      acc.atendidos += r.atendidos;
      acc.agendamentos += r.agendamentos;
      acc.promessas += r.promessas;
      acc.score += r.score;
      return acc;
    }, {tentativas:0, atendidos:0, agendamentos:0, promessas:0, score:0});

    box.innerHTML = `
      <div class="sectionTitle">Total da Equipe (${safeText(equipe || "-")})</div>
      <div class="small muted">
        <span class="tag">Tentativas: ${total.tentativas}</span>
        <span class="tag">Atendidos: ${total.atendidos}</span>
        <span class="tag">Agend.: ${total.agendamentos}</span>
        <span class="tag">Promessas: ${total.promessas}</span>
        <span class="tag">Score: ${total.score}</span>
      </div>
      <div class="divider"></div>

      <div class="sectionTitle">Ranking dos corretores</div>
      <table>
        <thead>
          <tr>
            <th>#</th><th>Corretor</th><th>Tent.</th><th>Atend.</th><th>Ag.</th><th>Prom.</th><th>Score</th>
          </tr>
        </thead>
        <tbody>
          ${teamRows.length ? teamRows.map((r,i)=>`
            <tr>
              <td>${i+1}</td>
              <td>${safeText(r.email || r.uid)}</td>
              <td>${r.tentativas}</td>
              <td>${r.atendidos}</td>
              <td>${r.agendamentos}</td>
              <td>${r.promessas}</td>
              <td><b>${r.score}</b></td>
            </tr>
          `).join("") : `<tr><td colspan="7" class="muted">Sem dados na equipe hoje.</td></tr>`}
        </tbody>
      </table>
    `;
    return;
  }

  // diretor
  // calcula ranking por equipe (gerente)
  const equipes = {};
  corretores.forEach(r=>{
    const eq = r.equipe || "Sem equipe";
    if(!equipes[eq]) equipes[eq] = { equipe:eq, tentativas:0, atendidos:0, agendamentos:0, promessas:0, score:0 };
    equipes[eq].tentativas += r.tentativas;
    equipes[eq].atendidos += r.atendidos;
    equipes[eq].agendamentos += r.agendamentos;
    equipes[eq].promessas += r.promessas;
    equipes[eq].score += r.score;
  });

  const teamTotals = Object.values(equipes).sort((a,b)=> b.score-a.score || b.atendidos-a.atendidos);

  const totalGeral = teamTotals.reduce((acc,t)=>{
    acc.tentativas += t.tentativas;
    acc.atendidos += t.atendidos;
    acc.agendamentos += t.agendamentos;
    acc.promessas += t.promessas;
    acc.score += t.score;
    return acc;
  }, {tentativas:0, atendidos:0, agendamentos:0, promessas:0, score:0});

  box.innerHTML = `
    <div class="sectionTitle">Total Geral (todas equipes)</div>
    <div class="small muted">
      <span class="tag">Tentativas: ${totalGeral.tentativas}</span>
      <span class="tag">Atendidos: ${totalGeral.atendidos}</span>
      <span class="tag">Agend.: ${totalGeral.agendamentos}</span>
      <span class="tag">Promessas: ${totalGeral.promessas}</span>
      <span class="tag">Score: ${totalGeral.score}</span>
    </div>
    <div class="divider"></div>

    <div class="sectionTitle">Ranking por equipe (gerentes)</div>
    <table>
      <thead>
        <tr>
          <th>#</th><th>Equipe</th><th>Tent.</th><th>Atend.</th><th>Ag.</th><th>Prom.</th><th>Score</th>
        </tr>
      </thead>
      <tbody>
        ${teamTotals.length ? teamTotals.map((t,i)=>`
          <tr>
            <td>${i+1}</td>
            <td><b>${safeText(t.equipe)}</b></td>
            <td>${t.tentativas}</td>
            <td>${t.atendidos}</td>
            <td>${t.agendamentos}</td>
            <td>${t.promessas}</td>
            <td><b>${t.score}</b></td>
          </tr>
        `).join("") : `<tr><td colspan="7" class="muted">Sem dados hoje.</td></tr>`}
      </tbody>
    </table>
  `;
};

/* =========================

   - Corretor: mensagem padrão + upload minha lista
   - Gerente: upload lista equipe + emailRelatorio
   - Diretor: upload lista geral + info

        <div class="small muted">Use: {{nome}} {{telefone}} {{email}}</div>

      <div class="card">
        <div class="sectionTitle">Upload • Minha Lista (Corretor)</div>

        <button class="btn btnBlue" onclick="salvarEmailRelatorio()">SALVAR</button>
      </div>
    `;
  }

  if(STATE.session.role === "diretor"){
    html += `
      <div class="card">
        <div class="sectionTitle">Upload • Lista Geral (Diretoria)</div>

          XSL/XLSX/CSV. Distribui aleatoriamente para corretores ATIVOS no momento do upload.

        Quando tudo estiver rodando, eu recomendo travar com regras por auth/roles.

}

/* =========================
   APROVAÇÕES (Diretor)
   ========================= */
function renderAprovacoes(){
  const app = $("app");
  let html = `${renderHeaderCard()}`;

  if(STATE.session.role !== "diretor"){
    html += `<div class="card"><div class="danger">Aba indisponível.</div></div>`;
    app.innerHTML = html;
    return;
  }

  html += `
    <div class="card">
      <div class="sectionTitle">Aprovações Pendentes</div>
      <div class="small muted">Aqui aparece todo mundo pendente/negado para você aprovar.</div>
      <div class="divider"></div>
      <button class="btn btnGold" onclick="loadAprovacoes()">ATUALIZAR</button>
      <div class="hrSpace"></div>
      <div id="aprovacoesList" class="small muted">Carregando...</div>
    </div>
  `;

  app.innerHTML = html;
  loadAprovacoes();
}

window.loadAprovacoes = async function(){
  const box = $("aprovacoesList");
  if(!box) return;

  const snap = await db.collection("users").get();
  const all = snap.docs.map(d => ({ uid: d.id, ...(d.data()||{}) }));
  const pend = all.filter(u => !isApproved(u) && !isDiretorEmail(u.email));

  if(pend.length === 0){
    box.innerHTML = `<div class="muted">Nenhum acesso pendente.</div>`;
    return;
  }

  box.innerHTML = `
    <table>
      <thead>
        <tr>
          <th>Usuário</th>
          <th>Role</th>
          <th>Equipe</th>
          <th>Status</th>
          <th>Ações</th>
        </tr>
      </thead>
      <tbody>
        ${pend.map(u=>`
          <tr>
            <td><b>${safeText(u.email || u.uid)}</b></td>
            <td>${safeText(u.role || "corretor")}</td>
            <td>${safeText(u.equipe || "-")}</td>
            <td>${safeText(u.status || "pendente")}</td>
            <td style="width:180px">
              <button class="btn btnSmall btnGreen" onclick="aprovarUser('${u.uid}')">APROVAR</button>
              <div style="height:6px"></div>
              <button class="btn btnSmall btnRed" onclick="negarUser('${u.uid}')">NEGAR</button>
            </td>
          </tr>
        `).join("")}
      </tbody>
    </table>
  `;
};

window.aprovarUser = async function(uid){
  await db.collection("users").doc(uid).update({
    status: "aprovado",
    aprovado: true,
    atualizadoEm: nowMs()
  });
  alert("Aprovado!");
  loadAprovacoes();
};

window.negarUser = async function(uid){
  await db.collection("users").doc(uid).update({
    status: "negado",
    aprovado: false,
    atualizadoEm: nowMs()
  });
  alert("Negado!");
  loadAprovacoes();
};

/* =========================
   AÇÕES CONFIG
   ========================= */
window.salvarMensagemPadrao = async function(){
  const msg = ($("msgPadrao")?.value || "");
  await db.collection("users").doc(STATE.session.uid).update({
    mensagemPadrao: msg,
    atualizadoEm: nowMs()
  });
  STATE.session.mensagemPadrao = msg;
  alert("Mensagem salva!");
};

window.uploadMinhaLista = async function(){
  const file = $("fileCorretor")?.files?.[0];
  if(!file) return alert("Selecione um arquivo.");
  const r = await uploadLeadsFromFile({
    file,
    origem:"corretor",
    equipe: STATE.session.equipe || "equipe1",
    donoUploadUid: STATE.session.uid,
    distribuirGeralAgora:false
  });
  alert(`Sua lista foi enviada! Total: ${r.total}.`);
  $("fileCorretor").value = "";
};

window.uploadListaEquipe = async function(){
  const file = $("fileGerente")?.files?.[0];
  if(!file) return alert("Selecione um arquivo.");
  const r = await uploadLeadsFromFile({
    file,
    origem:"gerente",
    equipe: STATE.session.equipe || "equipe1",
    donoUploadUid: STATE.session.uid,
    distribuirGeralAgora:false
  });
  alert(`Lista da equipe enviada! Total: ${r.total}.`);
  $("fileGerente").value = "";
};

window.salvarEmailRelatorio = async function(){
  const email = ($("emailRelatorio")?.value || "").trim();
  if(!email) return alert("Digite o email.");
  await db.collection("users").doc(STATE.session.uid).update({
    emailRelatorio: email,
    atualizadoEm: nowMs()
  });
  STATE.session.emailRelatorio = email;
  alert("Email salvo!");
};

window.uploadListaGeral = async function(){
  const file = $("fileDiretor")?.files?.[0];
  if(!file) return alert("Selecione um arquivo.");

  if(!isDiretorEmail(STATE.session.email)){
    return alert("Somente o Diretor pode enviar lista geral.");
  }

  const r = await uploadLeadsFromFile({
    file,
    origem:"geral",
    equipe:null,
    donoUploadUid: STATE.session.uid,
    distribuirGeralAgora:true
  });

  alert(`Lista geral enviada! Total: ${r.total}. Distribuída para corretores ATIVOS.`);
  $("fileDiretor").value = "";
};

/* =========================
   Set lead source
   ========================= */
window.setLeadSourceFromUI = function(v){
  if(STATE.lead.atualRef){
    alert("Você já está com lead em atendimento. Finalize/devolva antes de trocar a fonte.");
    // reverte select
    const el = $("leadSourcePainel");
    if(el) el.value = STATE.lead.source;
    return;
  }
  STATE.lead.source = v;
  alert("Fonte de leads definida: " + v.toUpperCase());
};

/* =========================
   Corretor ativa/pausa
   ========================= */
window.setCorretorAtivo = async function(ativo){
  if(STATE.session.role !== "corretor") return;

  await setActiveStatus(STATE.session.uid, ativo);

  // se pausou e estava com lead em atendimento, não bloqueia finalizar,
  // mas bloqueia pegar/ações (já está pelo disabled)
  renderApp();
};

/* =========================
   APP MAIN RENDER
   ========================= */
function renderApp(){
  renderNav();

  if(STATE.ui.tab === "painel") return renderPainel();
  if(STATE.ui.tab === "atendimento") return renderAtendimento();
  if(STATE.ui.tab === "mini") return renderMiniCRM();
  if(STATE.ui.tab === "resultados") return renderResultados();
  if(STATE.ui.tab === "config") return renderConfig();
  if(STATE.ui.tab === "aprovacoes") return renderAprovacoes();

  // fallback
  STATE.ui.tab = "painel";
  renderPainel();
}

/* =========================
   BOOTSTRAP / AUTH FIX DEFINITIVO
   ========================= */
auth.onAuthStateChanged(async (user)=>{
  try{
    if(!user){
      // reset state
      STATE.session = { uid:null,email:null,role:null,equipe:null,aprovado:false,ativo:false,loginTimestamp:null };
      STATE.ui.tab = "painel";
      STATE.lead = { atualRef:null,atualData:null,atualId:null,detailsOpen:false,lastLeadId:null,source:"geral" };
      renderLogin();
      return;
    }

    const email = user.email || "";
    const uid = user.uid;

    // diretor bypass total
    if(isDiretorEmail(email)){
      await ensureDiretorDoc(user);

      const data = await getUserDoc(uid) || {};
      STATE.session.uid = uid;
      STATE.session.email = email;
      STATE.session.role = "diretor";
      STATE.session.equipe = data.equipe || "DIRETORIA";
      STATE.session.aprovado = true;
      STATE.session.ativo = false;
      STATE.session.loginTimestamp = nowMs();

      STATE.ui.tab = "painel";
      renderApp();

      // start timer
      startTick();
      return;
    }

    // fluxo normal
    const doc = await getUserDoc(uid);
    if(!doc){
      await createPendingUserDoc(user);
      renderPendingApproval();
      return;
    }

    if(!isApproved(doc)){
      renderPendingApproval();
      return;
    }

    STATE.session.uid = uid;
    STATE.session.email = email;
    STATE.session.role = normalizeRole(doc.role) || "corretor";
    STATE.session.equipe = doc.equipe || "equipe1";
    STATE.session.aprovado = true;
    STATE.session.ativo = !!doc.ativo;
    STATE.session.mensagemPadrao = doc.mensagemPadrao || "";
    STATE.session.emailRelatorio = doc.emailRelatorio || "";
    STATE.session.loginTimestamp = nowMs();

    // tab default por role
    STATE.ui.tab = "painel";

    // gerente sem atendimento garantido no nav
    renderApp();

    startTick();
  }catch(e){
    $("navRoot").innerHTML = "";
    $("app").innerHTML = `
      ${renderBrand()}
      <div class="card">
        <div class="danger">Erro ao carregar:</div>
        <div class="divider"></div>
        <div class="small">${safeText(e.message || String(e))}</div>
        <div class="divider"></div>
        <button class="btn btnGold" onclick="doLogout()">SAIR</button>
      </div>
    `;
  }
});

/* =========================
   TICK LOOP (timeouts / refresh)
   ========================= */
function startTick(){
  if(STATE.timers.tickInterval) return;
  STATE.timers.tickInterval = setInterval(async ()=>{
    await enforceLeadTimeout();
  }, 5000);
}

/* =========================================================
   FIM
   ========================================================= */
</script>
