<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>PROEFI - ALVENA</title>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<style>
body{margin:0;font-family:Arial;background:#132c66;color:#fff}
.wrap{max-width:900px;margin:auto;padding:15px 15px 90px}
.card{background:#fff;color:#132c66;padding:16px;border-radius:14px;margin-bottom:12px}
.btn{padding:12px;border:none;border-radius:10px;font-weight:bold;width:100%;cursor:pointer}
.gold{background:#b8860b;color:#fff}
.tabs{
position:fixed;bottom:0;left:0;right:0;
display:flex;overflow:auto;
background:#0d1f4b;padding:8px;gap:8px
}
.tab{min-width:130px;background:#1f3c7d;color:#fff;padding:12px;border-radius:10px;text-align:center;font-weight:bold}
</style>
</head>

<body>
<div class="wrap" id="app">Carregando...</div>

<script>
const firebaseConfig={
apiKey:"AIzaSyAPO-xtmzg0QMvSoDfHd6nRcmrDb7F8n6k",
authDomain:"proefi-alvena.firebaseapp.com",
projectId:"proefi-alvena"
};
firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();
const auth=firebase.auth();

let userData=null;

function ui(html){document.getElementById("app").innerHTML=html;}

auth.onAuthStateChanged(async u=>{
if(!u){return loginUI();}
const d=await db.collection("users").doc(u.uid).get();
userData=d.data();
renderMain();
});

function loginUI(){
ui(`
<div class="card">
<h2>PROEFI - ALVENA</h2>
<input id="e" placeholder="email"><br><br>
<input id="s" type="password" placeholder="senha"><br><br>
<button class="btn gold" onclick="login()">ENTRAR</button>
</div>
`);
}

async function login(){
await auth.signInWithEmailAndPassword(e.value,s.value);
}

function renderMain(){
ui(`
<div class="card">
<h2>Painel (${userData.role.toUpperCase()})</h2>
<div>${auth.currentUser.email}</div>
<button class="btn gold" onclick="logout()">SAIR</button>
</div>

<div class="card">
<h3>🔥 Top 5 Empresa</h3>
<div id="top5">Carregando...</div>
</div>

<div class="card">
<h3>📌 Mini CRM</h3>
<div id="mini">Carregando...</div>
</div>

<div class="tabs">
<div class="tab">PAINEL</div>
<div class="tab">ATENDIMENTO</div>
<div class="tab">MINI CRM</div>
<div class="tab">RESULTADOS</div>
<div class="tab">CONFIG</div>
</div>
`);

loadTop5();
loadMiniCRM();
}

async function logout(){await auth.signOut();}






/* ===================================================
   TOP 5 NOVO — SEM QUERY COMPLEXA
=================================================== */
async function loadTop5(){

const snap=await db.collection("leads")
.orderBy("criadoEm","desc")
.limit(500)
.get();

let score={};

snap.forEach(doc=>{
const l=doc.data();
if(!l.corretorId) return;

if(!score[l.corretorId])score[l.corretorId]=0;

if(l.resultado==="AGENDAMENTO")score[l.corretorId]+=10;
else if(l.resultado==="PROMESSA DOCUMENTAÇÃO")score[l.corretorId]+=6;
else if(l.atendeu)score[l.corretorId]+=1;
});

let arr=Object.entries(score)
.sort((a,b)=>b[1]-a[1])
.slice(0,5);

if(arr.length===0){
top5.innerHTML="Sem dados ainda.";
return;
}

let html="";
for(let i=0;i<arr.length;i++){
html+=`<div>${i+1}º ${arr[i][0]} — ${arr[i][1]} pts</div>`;
}
top5.innerHTML=html;
}






/* ===================================================
   MINI CRM NOVO — SEM FILTRO FIRESTORE
=================================================== */
async function loadMiniCRM(){

const snap=await db.collection("leads")
.orderBy("criadoEm","desc")
.limit(200)
.get();

let list=[];

snap.forEach(doc=>{
const l=doc.data();
if(l.resultado==="AGENDAMENTO" || l.resultado==="PROMESSA DOCUMENTAÇÃO"){
list.push(l);
}
});

if(list.length===0){
mini.innerHTML="Nenhum agendamento ou promessa.";
return;
}

let html="";

list.slice(0,20).forEach(l=>{
html+=`
<div style="padding:10px;border:1px solid #ddd;border-radius:10px;margin-bottom:8px">
<b>${l.nome||"Cliente"}</b><br>
${l.telefone||""}<br>
<b>${l.resultado}</b><br>
Corretor: ${l.corretorEmail||l.corretorId||"-"}
</div>
`;
});

mini.innerHTML=html;
}
</script>
</body>
</html>
