<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>PROEFI - ALVENA</title>

  <style>
    :root{
      --blue:#21346C;
      --gold:#BC8A0B;
      --white:#FFFFFF;
      --greenLight:#B9F6CA;
      --redLight:#FFCCCB;

      --bg1:#21346C;
      --bg2:#0f1b3f;

      --text:#0f1b3f;
      --navSpace: 180px;

      --cardShadow: 0 10px 26px rgba(0,0,0,0.16);
      --radius: 16px;
    }

    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: Arial, sans-serif;
      background: linear-gradient(180deg, var(--bg1), var(--bg2));
      color: var(--white);
      min-height: 100vh;
    }
    .wrap{
      max-width: 650px;
      margin: 0 auto;
      padding: 18px 16px calc(var(--navSpace) + 18px) 16px;
    }

    .brand{
      text-align:center;
      margin-top:10px;
      margin-bottom:18px;
    }
    .brand h1{
      margin:0;
      font-size:28px;
      letter-spacing:0.5px;
      color: var(--gold);
    }
    .brand .sub{
      margin-top:6px;
      line-height:1.25;
      color: var(--white);
      opacity:0.95;
      font-size:14px;
    }

    .card{
      background: var(--white);
      color: var(--text);
      border-radius: var(--radius);
      padding: 16px;
      box-shadow: var(--cardShadow);
      margin-bottom: 14px;
    }

    .row{display:flex; gap:10px; align-items:center; flex-wrap:wrap}
    .grow{flex:1}

    input, select, textarea{
      width:100%;
      padding:12px;
      border-radius:12px;
      border:1px solid rgba(33,52,108,0.25);
      font-size:16px;
      outline:none;
    }
    textarea{min-height:90px; resize:vertical}

    .fieldLabel{
      font-size:12px;
      opacity:0.85;
      margin-bottom:6px;
      margin-top:12px;
    }

    .btn{
      width:100%;
      padding:14px;
      border:none;
      border-radius:14px;
      font-size:16px;
      font-weight:900;
      cursor:pointer;
      transition: transform .06s ease;
    }
    .btn:active{ transform: scale(0.99); }

    .btnGold{ background: var(--gold); color: var(--white); }
    .btnBlue{ background: var(--blue); color: var(--white); }
    .btnGreen{ background: var(--greenLight); color: var(--blue); }
    .btnRed{ background: var(--redLight); color: var(--blue); }

    .btnGhost{
      background: transparent;
      color: var(--blue);
      border:2px solid rgba(33,52,108,0.25);
    }

    .pill{
      display:inline-block;
      padding:6px 10px;
      border-radius:999px;
      font-size:12px;
      font-weight:900;
      background: rgba(188,138,11,0.12);
      color: var(--blue);
      white-space: nowrap;
    }

    .muted{opacity:0.75}
    .small{font-size:12px}
    .divider{height:1px; background:rgba(33,52,108,0.12); margin:12px 0}
    .center{text-align:center}

    .grid2{display:grid; grid-template-columns:1fr 1fr; gap:10px}
    .grid3{display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px}
    @media (max-width:420px){
      .grid3{grid-template-columns:1fr}
    }

    a{ text-decoration:none; }
    .danger{color:#b00020; font-weight:900}
    .ok{color:#0b6b2b; font-weight:900}

    .tableWrap{
      width:100%;
      overflow-x:auto;
      -webkit-overflow-scrolling: touch;
      border-radius: 14px;
      border: 1px solid rgba(15,29,68,0.10);
    }
    table{ width:100%; border-collapse: collapse; min-width: 620px; }
    th, td{ text-align:left; padding: 10px 10px; border-bottom: 1px solid rgba(15,29,68,0.10); font-size: 13px; }
    th{ background: rgba(33,52,108,0.06); font-size: 12px; letter-spacing:.2px; text-transform: uppercase; }
    tr:last-child td{border-bottom:none}

    .toggleRow{ display:flex; gap:10px; flex-wrap:wrap; }
    .toggleBtn{
      flex:1;
      min-width: 140px;
      padding: 12px 10px;
      border-radius: 14px;
      border: 1px solid rgba(33,52,108,0.18);
      background: rgba(33,52,108,0.04);
      color: var(--text);
      cursor:pointer;
      font-weight: 1000;
      text-align:center;
    }
    .toggleBtnOn{
      border-color: rgba(188,138,11,0.55);
      background: rgba(188,138,11,0.18);
    }

    .hidden{display:none !important}

    /* MENU INFERIOR (maior e proporcional) */
    .nav{
      position: fixed;
      left: 0; right: 0; bottom: 0;
      background: rgba(255,255,255,0.94);
      backdrop-filter: blur(10px);
      border-top: 1px solid rgba(15,29,68,0.10);
      display:flex;
      justify-content:center;
      z-index: 999;
      padding: 10px 10px calc(10px + env(safe-area-inset-bottom));
    }
    .navInner{
      width: min(820px, 100%);
      display:grid;
      gap: 10px;
    }
    .navInner[data-count="4"]{ grid-template-columns: repeat(4, 1fr); }
    .navInner[data-count="5"]{ grid-template-columns: repeat(3, 1fr); } /* 2 linhas */
    .navInner[data-count="3"]{ grid-template-columns: repeat(3, 1fr); }

    .navBtn{
      border: 1px solid rgba(15,29,68,0.12);
      border-radius: 18px;
      font-weight: 1000;
      font-size: 15px;
      padding: 12px 10px;
      cursor:pointer;
      background: rgba(33,52,108,0.08);
      color: var(--text);
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:6px;
      min-height: 66px;
      line-height:1.05;
      user-select:none;
      -webkit-tap-highlight-color: transparent;
    }
    .navBtn small{
      font-size: 12px;
      opacity:.78;
      font-weight: 900;
      letter-spacing:.2px;
    }
    .navBtnActive{
      background: rgba(188,138,11,0.20);
      border-color: rgba(188,138,11,0.35);
    }

    @media (max-width: 720px){
      .navInner[data-count="4"]{ grid-template-columns: repeat(2, 1fr); }
      .navInner[data-count="5"]{ grid-template-columns: repeat(2, 1fr); }
      .navInner[data-count="3"]{ grid-template-columns: repeat(2, 1fr); }
      .navBtn{ font-size: 16px; min-height: 72px; }
      .navBtn small{ font-size: 13px; }
      :root{ --navSpace: 220px; }
    }

    .errBox{
      background: #fff;
      color:#111;
      border-radius: 16px;
      padding:16px;
      box-shadow: var(--cardShadow);
      margin-top: 12px;
      white-space: pre-wrap;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size: 12px;
      overflow:auto;
      max-height: 45vh;
    }
  </style>
</head>

<body>
  <div class="wrap" id="app">Carregando…</div>

  <div class="nav hidden" id="bottomNav">
    <div class="navInner" id="navInner"></div>
  </div>

<script>
/* ==========================================================
   LOADER DIAGNÓSTICO (se travar, você vai ver o motivo)
   ========================================================== */

function $(id){ return document.getElementById(id); }
function escapeHtml(str){
  return String(str || "")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}

function showBoot(msg){
  const app = $("app");
  if(app) app.innerHTML = `<div class="brand">
    <h1>PROEFI - ALVENA</h1>
    <div class="sub">Produção Eficiente<br/>Alvena Soluções Imobiliária</div>
  </div>
  <div class="card">
    <b>Inicializando…</b>
    <div class="divider"></div>
    <div class="small muted">${escapeHtml(msg)}</div>
  </div>`;
}

function renderFatal(title, err){
  $("bottomNav")?.classList?.add("hidden");
  $("app").innerHTML = `
    <div class="brand">
      <h1>PROEFI - ALVENA</h1>
      <div class="sub">Produção Eficiente<br/>Alvena Soluções Imobiliária</div>
    </div>
    <div class="card">
      <div class="danger"><b>${escapeHtml(title)}</b></div>
      <div class="small muted">Copie esse erro e me envie.</div>
      <div class="divider"></div>
      <div class="errBox">${escapeHtml(String(err && (err.stack || err.message || err) || "Erro desconhecido"))}</div>
      <div class="divider"></div>
      <button class="btn btnGold" onclick="location.reload()">RECARREGAR</button>
    </div>
  `;
}

window.addEventListener("error", (e)=>{
  renderFatal("Erro no JavaScript (travou o carregamento)", e.error || e.message || e);
});
window.addEventListener("unhandledrejection", (e)=>{
  renderFatal("Promise rejeitada (travou o carregamento)", e.reason || e);
});

function loadScript(src){
  return new Promise((resolve, reject)=>{
    const s = document.createElement("script");
    s.src = src;
    s.async = true;
    s.onload = () => resolve(true);
    s.onerror = () => reject(new Error("Falha ao carregar: " + src));
    document.head.appendChild(s);
  });
}

(async function boot(){
  try{
    showBoot("Carregando Firebase… (app-compat)");
    await loadScript("https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js");

    showBoot("Carregando Firebase… (auth-compat)");
    await loadScript("https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js");

    showBoot("Carregando Firebase… (firestore-compat)");
    await loadScript("https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js");

    showBoot("Carregando XLSX…");
    await loadScript("https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js");

    if(typeof firebase === "undefined") throw new Error("Firebase não foi carregado (firebase undefined).");
    if(typeof XLSX === "undefined") throw new Error("XLSX não foi carregado (XLSX undefined).");

    showBoot("Iniciando aplicativo…");
    await startApp(); // chama o app real abaixo
  }catch(err){
    renderFatal("Falha na inicialização (scripts)", err);
  }
})();

/* ==========================================================
   APP REAL (começa aqui)
   ========================================================== */
async function startApp(){
  const firebaseConfig = {
    apiKey: "AIzaSyAPO-xtmzg0QMvSoDfHd6nRcmrDb7F8n6k",
    authDomain: "proefi-alvena.firebaseapp.com",
    projectId: "proefi-alvena",
    storageBucket: "proefi-alvena.firebasestorage.app",
    messagingSenderId: "1084612497727",
    appId: "1:1084612497727:web:d9b1de2962cce8123b038a",
    measurementId: "G-SZPXEMV5B4"
  };

  const MASTER_DIRECTOR_EMAIL = "jo.alvenasolucoes@gmail.com";

  function nowMs(){ return Date.now(); }
  function cleanPhone(raw){ return String(raw || "").replace(/\D/g,''); }
  function templateMessage(msg, lead){
    const nome = lead?.nome || "";
    const tel  = lead?.telefone || "";
    const em   = lead?.email || "";
    return String(msg || "")
      .replaceAll("{{nome}}", nome)
      .replaceAll("{{telefone}}", tel)
      .replaceAll("{{email}}", em);
  }
  function isMasterDirectorEmail(email){
    return String(email || "").toLowerCase() === MASTER_DIRECTOR_EMAIL.toLowerCase();
  }
  function dayStartMs(ts){ const d=new Date(ts); d.setHours(0,0,0,0); return d.getTime(); }
  function dayEndMs(ts){ const d=new Date(ts); d.setHours(23,59,59,999); return d.getTime(); }
  function toISODateInput(ts){
    const d = new Date(ts);
    const y = d.getFullYear();
    const m = String(d.getMonth()+1).padStart(2,'0');
    const da = String(d.getDate()).padStart(2,'0');
    return `${y}-${m}-${da}`;
  }
  function parseISODateInput(val){
    if(!val) return null;
    const [y,m,d] = val.split("-").map(Number);
    return new Date(y, m-1, d, 12, 0, 0, 0).getTime();
  }

  function renderBrand(){
    return `
      <div class="brand">
        <h1>PROEFI - ALVENA</h1>
        <div class="sub">Produção Eficiente<br/>Alvena Soluções Imobiliária</div>
      </div>
    `;
  }
  function renderHeader(userEmail, role, extraHtml=""){
    return `
      ${renderBrand()}
      <div class="card">
        <div class="row">
          <div class="grow">
            <div><b>${escapeHtml(role.toUpperCase())}</b></div>
            <div class="small muted">${escapeHtml(userEmail)}</div>
          </div>
          ${extraHtml}
        </div>
        <div class="divider"></div>
        <button class="btn btnGold" onclick="auth.signOut()">SAIR</button>
      </div>
    `;
  }
  function activeBadge(ativo){
    if(ativo) return `<span class="pill">ATIVO</span>`;
    return `<span class="pill" style="background:rgba(255,204,203,0.7)">PAUSADO</span>`;
  }

  function setTabsForRole(role){
    const nav = $("bottomNav");
    const inner = $("navInner");
    inner.innerHTML = "";

    const tabs = [];
    tabs.push({id:"painel", label:"Painel", sub:"status"});
    tabs.push({id:"mini", label:"Mini CRM", sub:"foco"});
    if(role === "corretor") tabs.push({id:"atend", label:"Atendimento", sub:"leads"});
    tabs.push({id:"result", label:"Resultados", sub:"top 5"});
    tabs.push({id:"config", label:"Config", sub:"ajustes"});

    inner.dataset.count = String(tabs.length);

    for(const t of tabs){
      const btn = document.createElement("button");
      btn.className = "navBtn";
      btn.id = "tab_"+t.id;
      btn.innerHTML = `${escapeHtml(t.label)}<small>${escapeHtml(t.sub)}</small>`;
      btn.onclick = () => goTab(t.id);
      inner.appendChild(btn);
    }

    nav.classList.remove("hidden");
    updateNavActive();
  }
  function updateNavActive(){
    ["painel","mini","atend","result","config"].forEach(id=>{
      const el = $("tab_"+id);
      if(!el) return;
      el.classList.toggle("navBtnActive", state.tab === id);
    });
  }

  /* sound */
  function playCash(){
    if(!state.soundOn) return;
    try{
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.type = "triangle";
      o.frequency.setValueAtTime(520, ctx.currentTime);
      o.frequency.exponentialRampToValueAtTime(820, ctx.currentTime + 0.08);
      g.gain.setValueAtTime(0.0001, ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.2, ctx.currentTime + 0.01);
      g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.12);
      o.connect(g); g.connect(ctx.destination);
      o.start(); o.stop(ctx.currentTime + 0.13);
      setTimeout(()=>ctx.close(), 300);
    }catch(_){}
  }

  /* firebase init */
  try{
    firebase.initializeApp(firebaseConfig);
  }catch(e){
    // se já inicializou, ignora
  }
  const auth = firebase.auth();
  const db = firebase.firestore();

  /* state */
  const state = {
    tab: "painel",
    user: null,
    userDoc: null,
    leadAtualRef: null,
    leadAtualData: null,
    leadSource: "geral",
    detailsOpen: false,
    soundOn: true
  };

  async function getUserDoc(uid){
    const snap = await db.collection("users").doc(uid).get();
    return snap.exists ? snap.data() : null;
  }

  window.goTab = async function(id){
    state.tab = id;
    updateNavActive();
    await renderApp();
  };

  function renderLogin(){
    $("bottomNav").classList.add("hidden");
    $("app").innerHTML = `
      ${renderBrand()}
      <div class="card">
        <div class="fieldLabel">Email</div>
        <input id="email" placeholder="Digite seu email" style="border:2px solid var(--gold)" />

        <div class="fieldLabel">Senha</div>
        <input id="senha" type="password" placeholder="Digite sua senha" style="border:2px solid var(--gold)" />

        <div class="divider"></div>
        <div class="grid2">
          <button class="btn btnGold" onclick="doLogin()">ENTRAR</button>
          <button class="btn btnBlue" onclick="toggleSignup(true)">CRIAR ACESSO</button>
        </div>

        <div class="divider"></div>
        <div class="small muted center">
          Se criar acesso, ficará <b>PENDENTE</b> até aprovação do Diretor/Gestor.
        </div>
      </div>

      <div class="card hidden" id="signupCard">
        <div><b>Criar Acesso (Pendente)</b></div>
        <div class="small muted">Diretor/Gestor aprova no Painel.</div>
        <div class="divider"></div>

        <div class="fieldLabel">Nome</div>
        <input id="nomeSignup" placeholder="Seu nome" />

        <div class="fieldLabel">Equipe (ex: equipe1)</div>
        <input id="equipeSignup" placeholder="ex: equipe1" />

        <div class="fieldLabel">Perfil</div>
        <select id="roleSignup">
          <option value="corretor">CORRETOR</option>
          <option value="gerente">GERENTE</option>
        </select>

        <div class="divider"></div>
        <button class="btn btnGold" onclick="doSignup()">CRIAR E AGUARDAR APROVAÇÃO</button>
        <button class="btn btnGhost" style="margin-top:10px" onclick="toggleSignup(false)">CANCELAR</button>
      </div>
    `;
  }

  window.toggleSignup = (open) => {
    const el = $("signupCard");
    if(!el) return;
    el.classList.toggle("hidden", !open);
  };

  window.doLogin = async function(){
    const email = ($("email").value || "").trim();
    const senha = $("senha").value || "";
    try{
      await auth.signInWithEmailAndPassword(email, senha);
    }catch(e){
      alert(e.message || e.code);
    }
  };

  window.doSignup = async function(){
    const email = ($("email").value || "").trim();
    const senha = $("senha").value || "";
    const nome  = ($("nomeSignup").value || "").trim();
    const equipe = ($("equipeSignup").value || "").trim() || "equipe1";
    const role = $("roleSignup").value;

    if(!email || !senha) return alert("Preencha email e senha.");
    if(senha.length < 6) return alert("Senha mínima: 6 caracteres.");
    if(!nome) return alert("Preencha seu nome.");

    try{
      const cred = await auth.createUserWithEmailAndPassword(email, senha);
      const uid = cred.user.uid;
      const isMaster = isMasterDirectorEmail(email);

      await db.collection("users").doc(uid).set({
        email,
        nome,
        equipe,
        role: isMaster ? "diretor" : role,
        aprovado: isMaster ? true : false,
        aprovadoEm: isMaster ? nowMs() : null,
        aprovadoPor: isMaster ? "MASTER" : null,
        ativo: false,
        ativoAtualizadoEm: nowMs(),
        mensagemPadrao: "Olá {{nome}}, aqui é da equipe Alvena. Estou tentando falar com você sobre seu interesse.",
        emailRelatorio: "",
        criadoEm: nowMs()
      });

      alert("Acesso criado! Agora aguarde aprovação.");
    }catch(e){
      if(String(e.code||"").includes("email-already-in-use")){
        alert("Este email já existe. Se estiver pendente, aguarde aprovação.");
      }else{
        alert(e.message || e.code);
      }
    }
  };

  function renderPendingApproval(){
    $("bottomNav").classList.add("hidden");
    $("app").innerHTML = `
      ${renderBrand()}
      <div class="card">
        <div class="danger">Acesso PENDENTE.</div>
        <div class="small muted">Aguarde aprovação do Diretor/Gestor.</div>
        <div class="divider"></div>
        <button class="btn btnGold" onclick="auth.signOut()">SAIR</button>
      </div>
    `;
  }

  async function fetchPendingUsersForApprover(){
    const me = state.userDoc;
    if(!me) return [];

    if(me.role === "diretor"){
      const snap = await db.collection("users").where("aprovado","==",false).get();
      return snap.docs.map(d => ({ id:d.id, ...d.data() }));
    }

    if(me.role === "gerente"){
      const equipe = me.equipe || "equipe1";
      const snap = await db.collection("users")
        .where("aprovado","==",false)
        .where("equipe","==",equipe)
        .get();
      return snap.docs.map(d => ({ id:d.id, ...d.data() }));
    }

    return [];
  }

  window.approveAccess = async function(uid){
    const me = state.userDoc;
    const approver = me.role === "diretor" ? "diretor" : "gerente";
    await db.collection("users").doc(uid).update({
      aprovado: true,
      aprovadoEm: nowMs(),
      aprovadoPor: `${approver}:${state.user.email}`
    });
    alert("Acesso aprovado!");
    await renderApp();
  };

  window.denyAccess = async function(uid){
    if(!confirm("Negar acesso? Isso removerá o usuário.")) return;
    await db.collection("users").doc(uid).delete();
    alert("Acesso negado/removido.");
    await renderApp();
  };

  async function setActiveStatus(uid, ativo){
    await db.collection("users").doc(uid).update({ ativo: !!ativo, ativoAtualizadoEm: nowMs() });
  }

  window.setMeActive = async function(ativo){
    await setActiveStatus(state.user.uid, ativo);
    state.userDoc = await getUserDoc(state.user.uid);
    await renderApp();
  };

  /* ======= Upload / Leads (essencial) ======= */
  function parseSheetRows(workbook){
    const sheetName = workbook.SheetNames[0];
    const ws = workbook.Sheets[sheetName];
    const rows = XLSX.utils.sheet_to_json(ws, { header: 1, raw: false, defval: "" });
    return rows.filter(r => r && r.some(cell => String(cell).trim() !== ""));
  }
  function detectHeaderRow(rows){
    const keys = ["nome","telefone","celular","contato","email","e-mail"];
    for(let i=0;i<Math.min(6, rows.length);i++){
      const row = rows[i].map(c=>String(c).toLowerCase().trim());
      if(row.some(c => keys.includes(c))) return i;
    }
    return 0;
  }
  function mapLeadColumns(row){
    return {
      nome: String(row[0] || "").trim(),
      telefone: String(row[1] || "").trim(),
      email: String(row[2] || "").trim()
    };
  }
  function makeLeadDoc(base){
    return {
      nome: base.nome || "",
      telefone: base.telefone || "",
      email: base.email || "",
      status: "fila",
      corretorId: null,
      criadoEm: nowMs(),
      atualizadoEm: nowMs(),
      emAtendimentoEm: null,
      timestampDistribuicao: null,
      timestampFinalizacao: null,
      atendeu: null,
      resultado: null,
      observacao: null,
      dataAgendada: null,
      totalTentativas: 0,
      origem: null,
      equipe: null,
      donoUpload: null,
      listaRef: null
    };
  }

  async function uploadLeadsFromFile({ file, origem, equipe, donoUploadUid, distribuirGeralAgora }){
    const arrayBuffer = await file.arrayBuffer();
    const workbook = XLSX.read(arrayBuffer, { type: "array" });
    const rows = parseSheetRows(workbook);
    if(rows.length === 0) throw new Error("Planilha vazia.");

    const headerIndex = detectHeaderRow(rows);
    const dataRows = rows.slice(headerIndex + 1);

    const parsed = [];
    for(const r of dataRows){
      const lead = mapLeadColumns(r);
      if(!lead.nome && !lead.telefone && !lead.email) continue;
      if(!lead.telefone) continue;
      parsed.push(lead);
    }
    if(parsed.length === 0) throw new Error("Nenhum lead válido (colunas A/B/C).");

    const listaDoc = await db.collection("listas").add({
      origem,
      equipe: equipe || null,
      donoUpload: donoUploadUid,
      arquivoNome: file.name,
      total: parsed.length,
      criadoEm: nowMs()
    });
    const listaRefId = listaDoc.id;

    let corretoresAtivos = [];
    if(origem === "geral" && distribuirGeralAgora){
      const snap = await db.collection("users")
        .where("role","==","corretor")
        .where("ativo","==",true)
        .where("aprovado","==",true)
        .get();
      corretoresAtivos = snap.docs.map(d => ({ uid: d.id, ...d.data() }));
      if(corretoresAtivos.length === 0){
        throw new Error("Nenhum corretor ATIVO no momento.");
      }
    }

    const batchSize = 350;
    let idx = 0;
    while(idx < parsed.length){
      const batch = db.batch();
      const slice = parsed.slice(idx, idx + batchSize);

      for(const leadBase of slice){
        const docRef = db.collection("leads").doc();
        const doc = makeLeadDoc(leadBase);

        doc.origem = origem;
        doc.equipe = equipe || null;
        doc.donoUpload = donoUploadUid;
        doc.listaRef = listaRefId;

        if(origem === "geral" && distribuirGeralAgora){
          const chosen = corretoresAtivos[Math.floor(Math.random() * corretoresAtivos.length)];
          doc.corretorId = chosen.uid;
          doc.status = "fila";
        }

        batch.set(docRef, doc);
      }
      await batch.commit();
      idx += batchSize;
    }

    return { total: parsed.length, listaRefId };
  }

  async function pickNextLeadForCorretor({ source, corretorUid, equipeCorretor }){
    let q = db.collection("leads").where("status","==","fila");

    if(source === "geral"){
      q = q.where("origem","==","geral").where("corretorId","==",corretorUid);
    }else if(source === "gerente"){
      q = q.where("origem","==","gerente").where("equipe","==",equipeCorretor).where("corretorId","==",null);
    }else{
      q = q.where("origem","==","corretor").where("donoUpload","==",corretorUid).where("corretorId","==",null);
    }

    const snap = await q.limit(1).get();
    if(snap.empty) return null;

    const docSnap = snap.docs[0];
    const ref = docSnap.ref;

    await ref.update({
      status: "em atendimento",
      corretorId: corretorUid,
      emAtendimentoEm: nowMs(),
      timestampDistribuicao: nowMs(),
      atualizadoEm: nowMs(),
      totalTentativas: firebase.firestore.FieldValue.increment(1)
    });

    const fresh = await ref.get();
    return { ref, data: fresh.data() };
  }

  /* ======= Relatórios TOP5 ======= */
  function computeStatsFromLeads(leads, startMs, endMs){
    let totalLigacoes = 0, totalNaoAtendeu = 0, totalAtendidos = 0, agend = 0, promessa = 0;
    for(const d of leads){
      if(d.timestampDistribuicao && d.timestampDistribuicao >= startMs && d.timestampDistribuicao <= endMs){
        totalLigacoes += 1;
        if(d.atendeu === false) totalNaoAtendeu += 1;
      }
      if(d.atendeu === true && d.timestampFinalizacao && d.timestampFinalizacao >= startMs && d.timestampFinalizacao <= endMs){
        totalAtendidos += 1;
        if(d.resultado === "AGENDAMENTO") agend += 1;
        if(d.resultado === "PROMESSA DOCUMENTAÇÃO") promessa += 1;
      }
    }
    return { totalLigacoes, totalNaoAtendeu, totalAtendidos, agend, promessa };
  }
  function scoreFromStats(st){
    return (st.agend * 3) + (st.promessa * 2) + Math.floor(st.totalAtendidos * 0.5);
  }
  async function getLeadsByPeriod({startMs, endMs, filtros}){
    let q = db.collection("leads");
    if(filtros?.corretorId) q = q.where("corretorId","==",filtros.corretorId);
    if(filtros?.equipe) q = q.where("equipe","==",filtros.equipe);

    const snap = await q.get();
    const arr = [];
    snap.forEach(ds=>{
      const d = ds.data();
      const t = d.timestampDistribuicao || d.timestampFinalizacao || d.atualizadoEm || d.criadoEm || 0;
      if(t >= startMs && t <= endMs) arr.push({ id: ds.id, ...d });
    });
    return arr;
  }

  async function computeTop5Empresa(startMs, endMs){
    const usersSnap = await db.collection("users").where("role","==","corretor").where("aprovado","==",true).get();
    const corretores = usersSnap.docs.map(d => ({ uid: d.id, ...d.data() }));
    const results = [];
    for(const c of corretores){
      const leads = await getLeadsByPeriod({ startMs, endMs, filtros: { corretorId: c.uid } });
      const st = computeStatsFromLeads(leads, startMs, endMs);
      results.push({
        corretor: c.nome || c.email || c.uid,
        equipe: c.equipe || "",
        score: scoreFromStats(st),
        ...st
      });
    }
    results.sort((a,b)=> b.score - a.score);
    return results.slice(0,5);
  }
  async function computeTop5Equipe(equipe, startMs, endMs){
    const usersSnap = await db.collection("users")
      .where("role","==","corretor")
      .where("aprovado","==",true)
      .where("equipe","==",equipe)
      .get();
    const corretores = usersSnap.docs.map(d => ({ uid: d.id, ...d.data() }));
    const results = [];
    for(const c of corretores){
      const leads = await getLeadsByPeriod({ startMs, endMs, filtros: { corretorId: c.uid } });
      const st = computeStatsFromLeads(leads, startMs, endMs);
      results.push({
        corretor: c.nome || c.email || c.uid,
        equipe: c.equipe || "",
        score: scoreFromStats(st),
        ...st
      });
    }
    results.sort((a,b)=> b.score - a.score);
    return results.slice(0,5);
  }

      source, corretorUid: state.user.uid, equipeCorretor: me.equipe || "equipe1"
    });

    if(!picked) return alert("Sem leads nessa fonte.");
    state.leadAtualRef = picked.ref;
    state.leadAtualData = picked.data;

    await renderLeadInArea();
  };

  async function renderLeadInArea(){
    const lead = state.leadAtualData;
    const area = $("leadArea");
    if(!area || !lead) return;

    const snap = await db.collection("users").doc(state.user.uid).get();
    const userAtual = snap.exists ? (snap.data() || {}) : {};
    const telClean = cleanPhone(lead.telefone);

    const msgBase  = userAtual.mensagemPadrao || "";
    const msgFinalRaw = templateMessage(msgBase, lead);
    const msgFinal = encodeURIComponent(msgFinalRaw);

    area.innerHTML = `
      <div><b>${escapeHtml(lead.nome || "Sem nome")}</b></div>
      <div class="small muted">${escapeHtml(lead.telefone || "")} • ${escapeHtml(lead.email || "")}</div>
      <div class="divider"></div>

      <div class="grid3">
        <a href="tel:${telClean}"><button class="btn btnBlue">📞 LIGAR</button></a>
        <a href="sms:${telClean}?body=${msgFinal}"><button class="btn btnBlue">📩 SMS</button></a>
        <a href="mailto:${encodeURIComponent(lead.email || "")}?subject=${encodeURIComponent("PROEFI - ALVENA")}&body=${msgFinal}">
          <button class="btn btnBlue">📧 EMAIL</button>
        </a>
      </div>

      <a href="https://wa.me/55${telClean}?text=${msgFinal}" target="_blank">
        <button class="btn btnBlue" style="margin-top:10px">💬 WHATSAPP</button>
      </a>

      <div class="divider"></div>
      <div class="grid2">
        <button class="btn btnGreen" onclick="finalizarSim('AGENDAMENTO')">AGENDOU</button>
        <button class="btn btnGold" onclick="finalizarSim('PROMESSA DOCUMENTAÇÃO')">PROMESSA</button>
      </div>
      <button class="btn btnRed" style="margin-top:10px" onclick="finalizarNao()">NÃO ATENDEU</button>
    `;
  }

  window.finalizarNao = async function(){
    await state.leadAtualRef.update({
      status: "fila",
      corretorId: (state.leadAtualData.origem === "geral") ? state.user.uid : null,
      emAtendimentoEm: null,
      timestampDistribuicao: null,
      timestampFinalizacao: null,
      atendeu: false,
      resultado: null,
      observacao: null,
      dataAgendada: null,
      atualizadoEm: nowMs()
    });
    state.leadAtualRef = null;
    state.leadAtualData = null;
    $("leadArea").innerHTML = `<div class="center muted">Devolvido para fila.</div>`;
  };

  window.finalizarSim = async function(tipo){
    await state.leadAtualRef.update({
      status: "finalizado",
      atendeu: true,
      resultado: tipo,
      timestampFinalizacao: nowMs(),
      atualizadoEm: nowMs()
    });

    if(tipo === "AGENDAMENTO" || tipo === "PROMESSA DOCUMENTAÇÃO") playCash();

    state.leadAtualRef = null;
    state.leadAtualData = null;
    $("leadArea").innerHTML = `<div class="center ok">Finalizado!</div>`;
  };

  /* ======= Render principal ======= */
  async function renderApp(){
    const me = state.userDoc;
    if(!me) return;

    setTabsForRole(me.role);

    if(me.role !== "corretor" && state.tab === "atend"){
      state.tab = "painel";
      updateNavActive();
    }

    if(state.tab === "painel") return renderPainel();
    if(state.tab === "mini") return renderMiniCrm();
    if(state.tab === "result") return renderResultados();
    if(state.tab === "config") return renderConfig();
    if(state.tab === "atend") return renderAtendimento();
    return renderPainel();
  }

  /* ======= Auth bootstrap ======= */
  auth.onAuthStateChanged(async (user)=>{
    state.user = user;

    if(!user){
      state.userDoc = null;
      state.tab = "painel";
      state.leadAtualRef = null;
      state.leadAtualData = null;
      renderLogin();
      return;
    }

    const userRef = db.collection("users").doc(user.uid);
    const snap = await userRef.get();

    if(!snap.exists){
      await userRef.set({
        email: user.email || "",
        nome: "",
        equipe: "equipe1",
        role: isMasterDirectorEmail(user.email) ? "diretor" : "corretor",
        aprovado: isMasterDirectorEmail(user.email),
        aprovadoEm: isMasterDirectorEmail(user.email) ? nowMs() : null,
        aprovadoPor: isMasterDirectorEmail(user.email) ? "MASTER" : null,
        ativo: false,
        ativoAtualizadoEm: nowMs(),
        mensagemPadrao: "Olá {{nome}}, aqui é da equipe Alvena. Estou tentando falar com você sobre seu interesse.",
        emailRelatorio: "",
        criadoEm: nowMs()
      });
    }

    state.userDoc = await getUserDoc(user.uid);

    if(isMasterDirectorEmail(user.email)){
      if(state.userDoc.role !== "diretor" || state.userDoc.aprovado !== true){
        await userRef.update({ role:"diretor", aprovado:true, aprovadoEm: nowMs(), aprovadoPor:"MASTER" });
        state.userDoc = await getUserDoc(user.uid);
      }
    }

    if(!state.userDoc.aprovado){
      renderPendingApproval();
      return;
    }

    await renderApp();
  });

  // Se chegou até aqui, o app está inicializado!
}
</script>
</body>
</html>
