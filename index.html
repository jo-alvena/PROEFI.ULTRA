    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");

function dayKey(ts){

  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,'0');

/** =========================================================
 *  UPLOAD / IMPORT
 *  ========================================================= */
function parseSheetRows(workbook){
  const sheetName = workbook.SheetNames[0];
  const ws = workbook.Sheets[sheetName];
  const rows = XLSX.utils.sheet_to_json(ws, { header: 1, raw: false, defval: "" });
  return rows.filter(r => r && r.some(cell => String(cell).trim() !== ""));
}
function detectHeaderRow(rows){
  const keys = ["nome","telefone","celular","contato","email","e-mail"];
  for(let i=0;i<Math.min(5, rows.length);i++){
    const row = rows[i].map(c=>String(c).toLowerCase().trim());
    if(row.some(c => keys.includes(c))) return i;
  }
  return 0;
}
function mapLeadColumns(row){
  const nome = String(row[0] || "").trim();
  const telefone = String(row[1] || "").trim();
  const email = String(row[2] || "").trim();
  return { nome, telefone, email };
}
function makeLeadDoc(base){
  return {
    nome: base.nome || "",
    telefone: base.telefone || "",
    email: base.email || "",
    status: "fila",
    corretorId: null,

    criadoEm: nowMs(),
    atualizadoEm: nowMs(),

    emAtendimentoEm: null,
    timestampDistribuicao: null,
    timestampFinalizacao: null,

    atendeu: null,
    resultado: null,
    observacao: null,
    dataAgendada: null,

    totalTentativas: 0,

    origem: null,     // geral | gerente | corretor
    equipe: null,
    donoUpload: null, // uid
    listaRef: null,

    ultimoCorretor: null,
    devolvidoEm: null
  };
}

async function uploadLeadsFromFile({ file, origem, equipe, donoUploadUid, distribuirGeralAgora }){
  const arrayBuffer = await file.arrayBuffer();
  const workbook = XLSX.read(arrayBuffer, { type: "array" });
  const rows = parseSheetRows(workbook);
  if(rows.length === 0) throw new Error("Planilha vazia.");

  const headerIndex = detectHeaderRow(rows);
  const dataRows = rows.slice(headerIndex + 1);

  const parsed = [];
  for(const r of dataRows){
    const lead = mapLeadColumns(r);
    if(!lead.nome && !lead.telefone && !lead.email) continue;
    if(!lead.telefone) continue;
    parsed.push(lead);
  }
  if(parsed.length === 0) throw new Error("Nenhum lead válido (verifique colunas A/B/C).");

  const listaDoc = await db.collection("listas").add({
    origem,
    equipe: equipe || null,
    donoUpload: donoUploadUid,
    arquivoNome: file.name,
    total: parsed.length,
    criadoEm: nowMs()
  });
  const listaRefId = listaDoc.id;

  let corretoresAtivos = [];
  if(origem === "geral" && distribuirGeralAgora){
    const snap = await db.collection("users")
      .where("role","==","corretor")
      .where("status","==","aprovado")
      .where("ativo","==",true)
      .get();

    corretoresAtivos = snap.docs.map(d => ({ uid:d.id, ...d.data() }));
    if(corretoresAtivos.length === 0){
      throw new Error("Nenhum corretor ATIVO no momento. Peça para os corretores clicarem 'ESTOU ATIVO' antes do upload da lista geral.");
    }
  }

  const batchSize = 400;
  let idx = 0;

  while(idx < parsed.length){
    const batch = db.batch();
    const slice = parsed.slice(idx, idx + batchSize);

    for(const leadBase of slice){
      const docRef = db.collection("leads").doc();
      const doc = makeLeadDoc(leadBase);

      doc.origem = origem;
      doc.equipe = equipe || null;
      doc.donoUpload = donoUploadUid;
      doc.listaRef = listaRefId;

      // Distribuição aleatória no upload (somente lista geral)
      if(origem === "geral" && distribuirGeralAgora){
        const chosen = corretoresAtivos[Math.floor(Math.random() * corretoresAtivos.length)];
        doc.corretorId = chosen.uid;  // fila já “carimbada”
        doc.status = "fila";
      }

      batch.set(docRef, doc);
    }

    await batch.commit();
    idx += batchSize;
  }

  return { total: parsed.length, listaRefId };
}

/** =========================================================
 *  PEGAR LEAD (ALEATÓRIO + ANTI-REPETIÇÃO)
 *  ========================================================= */
async function queryCandidates({ source, corretorUid, equipeCorretor }){
  let q = db.collection("leads").where("status","==","fila");

  if(source === "geral"){
    q = q.where("origem","==","geral").where("corretorId","==",corretorUid);
  }else if(source === "gerente"){
    q = q.where("origem","==","gerente").where("equipe","==",equipeCorretor).where("corretorId","==",null);
  }else{
    q = q.where("origem","==","corretor").where("donoUpload","==",corretorUid).where("corretorId","==",null);
  }

  const snap = await q.limit(12).get();
  return snap.docs;
}

async function pickNextLeadForCorretor({ source, corretorUid, equipeCorretor }){
  const candidates = await queryCandidates({ source, corretorUid, equipeCorretor });
  if(candidates.length === 0) return null;

  const filtered = candidates.filter(d => !excludedLeadIds.has(d.id));
  const list = filtered.length ? filtered : candidates;
  const chosen = list[Math.floor(Math.random() * list.length)];

  const ref = chosen.ref;

  await ref.update({
    status: "em atendimento",
    corretorId: corretorUid,
    emAtendimentoEm: nowMs(),
    timestampDistribuicao: nowMs(),
    atualizadoEm: nowMs(),
    totalTentativas: firebase.firestore.FieldValue.increment(1)
  });

  const fresh = await ref.get();
  return { ref, data: fresh.data(), id: chosen.id };
}

  const userAtual = snap.exists ? (snap.data() || {}) : {};

  const telClean = cleanPhone(lead.telefone);
  const msgBase  = userAtual.mensagemPadrao || "";
  const msgFinal = encodeURIComponent(templateMessage(msgBase, lead));

  area.innerHTML = `

let timerInterval = null;

function startTimer(){
  stopTimer();
  seconds = 0;
  timerInterval = setInterval(()=>{
    seconds++;
    const m = String(Math.floor(seconds/60)).padStart(2,'0');
    const s = String(seconds%60).padStart(2,'0');
    const t = $("timer");
    if(t) t.innerText = `${m}:${s}`;
  },1000);
}
function stopTimer(){
  if(timerInterval){ clearInterval(timerInterval); timerInterval = null; }
}

async function gerarRelatorioExcelPorDia({ uid, email, equipe, day }){
  const snap = await db.collection("leads").where("corretorId","==",uid).get();
  if(snap.empty) throw new Error("Sem registros para relatório.");

  let totalLigacoes = 0;
  let totalNaoAtendeu = 0;
  let totalAtendidos = 0;
  let totalAgend = 0;
  let totalPromessa = 0;
  let totalSemInteresse = 0;

  const atendidosRows = [];

  snap.forEach(ds=>{
    const d = ds.data();

    if(d.timestampDistribuicao && dayKey(d.timestampDistribuicao) === day){
      totalLigacoes += 1;
      if(d.atendeu === false) totalNaoAtendeu += 1;
    }

    if(d.atendeu === true && d.timestampFinalizacao && dayKey(d.timestampFinalizacao) === day){
      totalAtendidos += 1;

      if(d.resultado === "AGENDAMENTO") totalAgend += 1;
      else if(d.resultado === "PROMESSA DOCUMENTAÇÃO") totalPromessa += 1;
      else if(d.resultado === "NÃO GEROU INTERESSE") totalSemInteresse += 1;

      const tempoMin = (d.timestampFinalizacao && d.timestampDistribuicao)
        ? Math.max(0, Math.floor((d.timestampFinalizacao - d.timestampDistribuicao)/60000))
        : "";

      atendidosRows.push({
        Cliente: d.nome || "",
        Telefone: d.telefone || "",
        Email: d.email || "",
        Resultado: d.resultado || "",
        "Data/Hora Agendada": d.dataAgendada || "",
        Feedback: d.observacao || "",
        "Tempo Atendimento (min)": tempoMin,
        "Origem": d.origem || "",
        "Equipe": d.equipe || ""
      });
    }
  });

  const tempoLogadoMin = loginTimestamp ? Math.max(0, Math.floor((nowMs()-loginTimestamp)/60000)) : 0;

  const resumo = [
    ["Operador", email],
    ["Equipe", equipe || ""],
    ["Tempo total logado (min)", tempoLogadoMin],
    ["Total de ligações (tentativas)", totalLigacoes],
    ["Total NÃO atendeu", totalNaoAtendeu],
    ["Total ATENDIDOS", totalAtendidos],
    ["Agendamentos", totalAgend],
    ["Promessa documentação", totalPromessa],
    ["Não gerou interesse", totalSemInteresse],
    ["Data", day]
  ];

  const wsResumo = XLSX.utils.aoa_to_sheet(resumo);
  const wsAtend  = XLSX.utils.json_to_sheet(atendidosRows);

  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, wsResumo, "Resumo");
  XLSX.utils.book_append_sheet(wb, wsAtend, "Atendidos");

  return wb;
}

/** =========================================================
 *  MINI CRM (ATENDIDOS: PROMESSA / AGENDAMENTO)
 *  - permite editar resultado e apagar (somente status finalizado)
 *  ========================================================= */
async function fetchMiniCRM({ uid, day }){
  const snap = await db.collection("leads").where("corretorId","==",uid).get();
  const rows = [];
  snap.forEach(ds=>{
    const d = ds.data();
    if(d.status !== "finalizado") return;
    if(!d.timestampFinalizacao) return;
    if(dayKey(d.timestampFinalizacao) !== day) return;
    if(!(d.resultado === "AGENDAMENTO" || d.resultado === "PROMESSA DOCUMENTAÇÃO")) return;

    rows.push({ id: ds.id, ...d });
  });
  // ordena por mais recente
  rows.sort((a,b)=>(b.timestampFinalizacao||0)-(a.timestampFinalizacao||0));
  return rows;
}

/** =========================================================
 *  RANKINGS / KPIs
 *  ========================================================= */
async function buildRankingCorretorDia({ equipe, day }){
  const snapUsers = await db.collection("users")
    .where("role","==","corretor")
    .where("status","==","aprovado")
    .get();

  const corretores = snapUsers.docs.map(d=>({ uid:d.id, ...d.data() }))
    .filter(u => (equipe ? u.equipe === equipe : true));

  // busca leads por corretor (simples, sem depender de index complexo)
  const ranking = [];
  for(const c of corretores){
    const leadsSnap = await db.collection("leads").where("corretorId","==",c.uid).get();
    let total = 0, atendidos = 0, ag = 0, pr = 0;

    leadsSnap.forEach(ds=>{
      const l = ds.data();
      if(l.timestampDistribuicao && dayKey(l.timestampDistribuicao) === day) total += 1;
      if(l.atendeu === true && l.timestampFinalizacao && dayKey(l.timestampFinalizacao) === day){
        atendidos += 1;
        if(l.resultado === "AGENDAMENTO") ag += 1;
        if(l.resultado === "PROMESSA DOCUMENTAÇÃO") pr += 1;
      }
    });

    // score simples
    const score = (ag*3) + (pr*2) + (atendidos*1);
    ranking.push({
      email: c.email || c.uid,
      equipe: c.equipe || "",
      total, atendidos, ag, pr, score
    });
  }

  ranking.sort((a,b)=> b.score - a.score);
  return ranking;
}

async function buildRankingGerentesDia({ day }){
  const snap = await db.collection("users")
    .where("role","==","gerente")
    .where("status","==","aprovado")
    .get();

  const gerentes = snap.docs.map(d=>({ uid:d.id, ...d.data() }));

  const rows = [];
  for(const g of gerentes){
    const equipe = g.equipe || "equipe1";
    const rank = await buildRankingCorretorDia({ equipe, day });
    const totalEquipe = rank.reduce((s,r)=>s+r.total,0);
    const agEquipe = rank.reduce((s,r)=>s+r.ag,0);
    const prEquipe = rank.reduce((s,r)=>s+r.pr,0);
    const scoreEquipe = rank.reduce((s,r)=>s+r.score,0);

    rows.push({
      gerente: g.email || g.uid,
      equipe,
      totalEquipe,
      agEquipe,
      prEquipe,
      scoreEquipe
    });
  }
  rows.sort((a,b)=>b.scoreEquipe-a.scoreEquipe);
  return rows;
}

window.aprovarUser = async function(uid){
  await db.collection("users").doc(uid).update({ status:"aprovado", aprovadoEm: nowMs() });
  alert("Aprovado!");
  // recarrega a aba atual
  if(currentRole==="diretor") goDiretor("acessos");
  if(currentRole==="gerente") goGerente("acessos");
};

  alert("Role atualizado!");
  if(currentRole==="diretor") goDiretor("acessos");
};
window.setEquipe = async function(uid){
  const v = ($("eq_"+uid)?.value || "equipe1").trim();
  await db.collection("users").doc(uid).update({ equipe: v });
  alert("Equipe salva!");
  if(currentRole==="diretor") goDiretor("acessos");
};

/** =========================================================
 *  BOOTSTRAP
 *  ========================================================= */
auth.onAuthStateChanged(async (user)=>{
  if(!user){
    loginTimestamp = null;
    leadAtualRef = null;
    leadAtualData = null;
    detailsOpen = false;
    excludedLeadIds = new Set();
    currentTab = "painel";
    renderLogin();
    return;
  }

  try{ await ensureDirectorForCurrentUser(); }catch(_){}

  const snap = await db.collection("users").doc(user.uid).get();
  if(!snap.exists){
    renderPending(user, {status:"pendente"});
    return;
  }

  const data = snap.data();
  if(data.status !== "aprovado"){
    renderPending(user, data);
    return;
  }

  currentRole = data.role;
  currentUserDoc = data;

  // se estiver pausado, garante que não fica com lead preso
  if(data.role==="corretor" && data.ativo !== true && leadAtualRef){
    try{
      await leadAtualRef.update({
        status:"fila",
        ultimoCorretor:user.uid,
        devolvidoEm: nowMs(),
        emAtendimentoEm:null,
        timestampDistribuicao:null,
        atualizadoEm: nowMs()
      });
    }catch(_){}
    leadAtualRef=null; leadAtualData=null; detailsOpen=false;
  }

  if(data.role === "diretor"){
    renderDiretorShell(user, data);
  }else if(data.role === "gerente"){
    renderGerenteShell(user, data);
  }else{
    renderCorretorShell(user, data);
  }
});
</script>
