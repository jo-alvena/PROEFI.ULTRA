  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const da = String(d.getDate()).padStart(2,'0');

/** =========================
 *  Upload & Import (XLS/XLSX/CSV)
 *  ========================= */
function parseSheetRows(workbook){
  const sheetName = workbook.SheetNames[0];
  const ws = workbook.Sheets[sheetName];
  const rows = XLSX.utils.sheet_to_json(ws, { header: 1, raw: false, defval: "" });
  return rows.filter(r => r && r.some(cell => String(cell).trim() !== ""));
}

function detectHeaderRow(rows){
  const keys = ["nome","telefone","celular","contato","email","e-mail"];
  for(let i=0;i<Math.min(5, rows.length);i++){
    const row = rows[i].map(c=>String(c).toLowerCase().trim());
    if(row.some(c => keys.includes(c))) return i;
  }
  return 0;
}

function mapLeadColumns(row){
  const nome = String(row[0] || "").trim();
  const telefone = String(row[1] || "").trim();
  const email = String(row[2] || "").trim();
  return { nome, telefone, email };
}

function makeLeadDoc(base){
  return {
    nome: base.nome || "",
    telefone: base.telefone || "",
    email: base.email || "",
    status: "fila",
    corretorId: null,

    criadoEm: nowMs(),
    atualizadoEm: nowMs(),

    emAtendimentoEm: null,
    timestampDistribuicao: null,
    timestampFinalizacao: null,

    atendeu: null,
    resultado: null,
    observacao: null,
    dataAgendada: null,

    totalTentativas: 0,

    origem: null,        // geral | gerente | corretor
    equipe: null,        // string
    donoUpload: null,    // uid
    listaRef: null,      // id da lista
    ultimoCorretor: null,
    devolvidoEm: null
  };
}

async function uploadLeadsFromFile({ file, origem, equipe, donoUploadUid, distribuirGeralAgora }){
  const arrayBuffer = await file.arrayBuffer();
  const workbook = XLSX.read(arrayBuffer, { type: "array" });
  const rows = parseSheetRows(workbook);
  if(rows.length === 0) throw new Error("Planilha vazia.");

  const headerIndex = detectHeaderRow(rows);
  const dataRows = rows.slice(headerIndex + 1);

  const parsed = [];
  for(const r of dataRows){
    const lead = mapLeadColumns(r);
    if(!lead.nome && !lead.telefone && !lead.email) continue;
    if(!lead.telefone) continue;
    parsed.push(lead);
  }
  if(parsed.length === 0) throw new Error("Nenhum lead válido (verifique colunas A/B/C).");

  const listaDoc = await db.collection("listas").add({
    origem,
    equipe: equipe || null,
    donoUpload: donoUploadUid,
    arquivoNome: file.name,
    total: parsed.length,
    criadoEm: nowMs()
  });
  const listaRefId = listaDoc.id;

  let corretoresAtivos = [];
  if(origem === "geral" && distribuirGeralAgora){
    const snap = await db.collection("users")
      .where("role","==","corretor")
      .where("ativo","==",true)
      .where("status","==","aprovado")
      .get();
    corretoresAtivos = snap.docs.map(d => ({ uid: d.id, ...d.data() }));
    if(corretoresAtivos.length === 0){
      throw new Error("Nenhum corretor ATIVO no momento. Peça para os corretores clicarem 'ESTOU ATIVO' antes do upload da lista geral.");
    }
  }

  const batchSize = 400;
  let idx = 0;

  while(idx < parsed.length){
    const batch = db.batch();
    const slice = parsed.slice(idx, idx + batchSize);

    for(const leadBase of slice){
      const docRef = db.collection("leads").doc();
      const doc = makeLeadDoc(leadBase);

      doc.origem = origem;
      doc.equipe = equipe || null;
      doc.donoUpload = donoUploadUid;
      doc.listaRef = listaRefId;

      if(origem === "geral" && distribuirGeralAgora){
        const chosen = corretoresAtivos[Math.floor(Math.random() * corretoresAtivos.length)];
        doc.corretorId = chosen.uid;  // pré-atribuído
        doc.status = "fila";
      }

      batch.set(docRef, doc);
    }

    await batch.commit();
    idx += batchSize;
  }

  return { total: parsed.length, listaRefId };
}

/** =========================
 *  Lead picking (evita repetir)
 *  ========================= */
async function queryCandidates({ source, corretorUid, equipeCorretor }){
  let q = db.collection("leads").where("status","==","fila");

  if(source === "geral"){
    q = q.where("origem","==","geral").where("corretorId","==",corretorUid);
  }else if(source === "gerente"){
    q = q.where("origem","==","gerente").where("equipe","==",equipeCorretor).where("corretorId","==",null);
  }else{
    q = q.where("origem","==","corretor").where("donoUpload","==",corretorUid).where("corretorId","==",null);
  }

  // pega alguns e escolhe aleatório no client (sem precisar de orderBy/índice)
  const snap = await q.limit(10).get();
  return snap.docs;
}

async function pickNextLeadForCorretor({ source, corretorUid, equipeCorretor }){
  const candidates = await queryCandidates({ source, corretorUid, equipeCorretor });
  if(candidates.length === 0) return null;

  // filtra os excluídos (para evitar repetir logo em seguida)
  const filtered = candidates.filter(d => !excludedLeadIds.has(d.id));
  const list = filtered.length ? filtered : candidates;

  const chosen = list[Math.floor(Math.random() * list.length)];
  const ref = chosen.ref;

  await ref.update({
    status: "em atendimento",
    corretorId: corretorUid,
    emAtendimentoEm: nowMs(),
    timestampDistribuicao: nowMs(),
    atualizadoEm: nowMs(),
    totalTentativas: firebase.firestore.FieldValue.increment(1)
  });

  const fresh = await ref.get();
  return { ref, data: fresh.data() };
}

  if(tab === "atendimento") return renderTabAtendimentoCorretor();
  if(tab === "mini") return renderTabMiniCRMCorretor();
  if(tab === "resultados") return renderTabResultadosCorretor();
  if(tab === "config") return renderTabConfigCorretor();
};

window.toggleOption = function(which){
  ["ag","pr","si"].forEach(k=>{
    const el = $("opt_"+k);
    if(!el) return;
    if(k === which){
      el.style.display = (el.style.display === "none") ? "block" : "none";
    }else{
      el.style.display = "none";
    }
  });
};

window.cancelarAtendeu = function(){
  // só fecha opções (não salva nada)
  ["ag","pr","si"].forEach(k=>{
    const el = $("opt_"+k);
    if(el) el.style.display = "none";
  });
};

window.confirmarAtendeuComConfirmacao = async function(resultado){
  if(!leadAtualRef) return;
  if(!requireActiveOrAlert()) return;

  // validações
  let dataAgendada = null;
  let obs = null;

  if(resultado === "AGENDAMENTO"){
    const d = $("agData").value;
    const h = $("agHora").value;
    if(!d || !h) return alert("Preencha data e horário do agendamento.");
    dataAgendada = `${d} ${h}`;
    obs = ($("obsAg").value || "").trim();
  }else if(resultado === "PROMESSA DOCUMENTAÇÃO"){
    obs = ($("obsPr").value || "").trim();
  }else{
    const fb = ($("fb").value || "").trim();
    if(!fb) return alert("Feedback é obrigatório.");
    obs = fb;
  }

  const ok = confirm(`Confirmar finalização como:\n\n${resultado}\n\nClique OK para salvar ou Cancelar para revisar.`);
  if(!ok) return;

  await leadAtualRef.update({
    status: "finalizado",
    atendeu: true,
    resultado,
    observacao: obs || null,
    dataAgendada: dataAgendada,
    timestampFinalizacao: nowMs(),
    atualizadoEm: nowMs()
  });

  leadAtualRef = null;
  leadAtualData = null;
  detailsOpen = false;

  // pega outro automaticamente
  await pegarProximoLead(true);
};

/** ===== Pegar próximo lead ===== */
window.pegarProximoLead = async function(silent=false){
  if(!requireActiveOrAlert()) return;

  if(leadAtualRef){

  const user = auth.currentUser;
  const me = currentUserDoc || await getUserDoc(user.uid);

  const equipe = me.equipe || "equipe1";

  const picked = await pickNextLeadForCorretor({

  await goTabCorretor("atendimento");
};

/** =========================
 *  Mini CRM (Corretor)
 *  ========================= */
async function renderTabMiniCRMCorretor(){
  const c = $("tabContent");
  const user = auth.currentUser;
  const today = dayKey(nowMs());

  c.innerHTML = `
    <div class="card">
      <div><b>Mini CRM • Hoje (${today})</b></div>
      <div class="small muted">Mostra apenas PROMESSA + AGENDAMENTO finalizados hoje.</div>
    </div>
    <div id="miniList"></div>
  `;

  const snap = await db.collection("leads")
    .where("corretorId","==",user.uid)
    .where("status","==","finalizado")
    .get();

  const itens = [];
  snap.forEach(ds=>{
    const d = ds.data();
    if(!d.timestampFinalizacao) return;
    if(dayKey(d.timestampFinalizacao) !== today) return;
    if(d.resultado !== "AGENDAMENTO" && d.resultado !== "PROMESSA DOCUMENTAÇÃO") return;
    itens.push({ id: ds.id, ...d });
  });

  const box = $("miniList");
  if(itens.length === 0){
    box.innerHTML = `<div class="card"><div class="center muted">Sem itens hoje.</div></div>`;
    return;
  }

  box.innerHTML = itens.map(it=>`
    <div class="card">
      <div><b>${it.nome || "Sem nome"}</b></div>
      <div class="small muted">${it.telefone || ""} ${it.email ? "• "+it.email : ""}</div>
      <div class="divider"></div>
      <div class="row">
        <div class="pill">${it.resultado}</div>
        ${it.dataAgendada ? `<div class="pill">📅 ${it.dataAgendada}</div>` : ``}
      </div>
      ${it.observacao ? `<div class="divider"></div><div class="small"><b>Obs:</b> ${escapeHtml(it.observacao)}</div>` : ``}

      <div class="divider"></div>
      <div class="grid2">
        <button class="btn btnBlue" onclick="editarMini('${it.id}')">Editar</button>
        <button class="btn btnRed" onclick="excluirMini('${it.id}')">Excluir</button>
      </div>

      <div id="edit_${it.id}" style="display:none; margin-top:10px"></div>
    </div>
  `).join("");
}

function escapeHtml(s){
  return String(s||"")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}

window.editarMini = async function(id){
  const el = $("edit_"+id);
  if(!el) return;

  if(el.style.display === "none"){
    el.style.display = "block";
  }else{
    el.style.display = "none";
    return;
  }

  const doc = await db.collection("leads").doc(id).get();
  if(!doc.exists) return;
  const d = doc.data();

  el.innerHTML = `
    <div class="divider"></div>
    <div class="fieldLabel">Resultado</div>
    <select id="res_${id}">
      <option ${d.resultado==="AGENDAMENTO"?"selected":""}>AGENDAMENTO</option>

window.salvarMini = async function(id){
  const res = $("res_"+id).value;
  const dt  = ($("dt_"+id).value || "").trim();
  const ob  = ($("ob_"+id).value || "").trim();

  if(res === "AGENDAMENTO" && !dt){
    return alert("Para AGENDAMENTO, preencha Data/Hora.");

  await db.collection("leads").doc(id).update({
    resultado: res,
    dataAgendada: res === "AGENDAMENTO" ? dt : null,
    observacao: ob || null,
    atualizadoEm: nowMs()
  });

  alert("Atualizado!");
  await renderTabMiniCRMCorretor();
};

window.excluirMini = async function(id){
  const ok = confirm("Excluir este registro do Mini CRM? (Isso apaga o lead finalizado do banco)");
  if(!ok) return;
  await db.collection("leads").doc(id).delete();
  await renderTabMiniCRMCorretor();
};

/** =========================
 *  Relatório Excel + Email (Corretor)
 *  ========================= */
window.gerarRelatorioExcel = async function(){
  const user = auth.currentUser;
  const me = await getUserDoc(user.uid);
  if(!me || me.role !== "corretor") return;

  const snap = await db.collection("leads").where("corretorId","==",user.uid).get();
  if(snap.empty) return alert("Sem registros para relatório.");

  const today = dayKey(nowMs());

  let totalLigacoes = 0;
  let totalNaoAtendeu = 0;
  let totalAtendidos = 0;
  let totalAgend = 0;
  let totalPromessa = 0;
  let totalSemInteresse = 0;

  const atendidosRows = [];

  snap.forEach(ds=>{
    const d = ds.data();

    if(d.timestampDistribuicao && dayKey(d.timestampDistribuicao) === today){
      totalLigacoes += 1;
    }
    if(d.atendeu === false && d.devolvidoEm && dayKey(d.devolvidoEm) === today){
      totalNaoAtendeu += 1;
    }

    if(d.atendeu === true && d.timestampFinalizacao && dayKey(d.timestampFinalizacao) === today){
      totalAtendidos += 1;
      if(d.resultado === "AGENDAMENTO") totalAgend += 1;
      else if(d.resultado === "PROMESSA DOCUMENTAÇÃO") totalPromessa += 1;
      else if(d.resultado === "NÃO GEROU INTERESSE") totalSemInteresse += 1;

      const tempoMin = (d.timestampFinalizacao && d.timestampDistribuicao)
        ? Math.max(0, Math.floor((d.timestampFinalizacao - d.timestampDistribuicao)/60000))
        : "";

      atendidosRows.push({
        Cliente: d.nome || "",
        Telefone: d.telefone || "",
        Email: d.email || "",
        Resultado: d.resultado || "",
        "Data/Hora Agendada": d.dataAgendada || "",
        Feedback: d.observacao || "",
        "Tempo Atendimento (min)": tempoMin
      });
    }
  });

  const tempoLogadoMin = loginTimestamp ? Math.max(0, Math.floor((nowMs()-loginTimestamp)/60000)) : 0;

  const resumo = [
    ["Operador", user.email],
    ["Equipe", me.equipe || ""],
    ["Tempo total logado (min)", tempoLogadoMin],
    ["Total de ligações (tentativas)", totalLigacoes],
    ["Total NÃO atendeu", totalNaoAtendeu],
    ["Total ATENDIDOS", totalAtendidos],
    ["Agendamentos", totalAgend],
    ["Promessa documentação", totalPromessa],
    ["Não gerou interesse", totalSemInteresse],
    ["Data", today]
  ];

  const wsResumo = XLSX.utils.aoa_to_sheet(resumo);
  const wsAtend  = XLSX.utils.json_to_sheet(atendidosRows);

  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, wsResumo, "Resumo");
  XLSX.utils.book_append_sheet(wb, wsAtend, "Atendidos");

  XLSX.writeFile(wb, `PROEFI_RELATORIO_${today}.xlsx`);
  alert("Relatório Excel gerado (baixado no dispositivo).");
};

window.prepararEmailRelatorio = async function(){

window.uploadListaGerente = async function(){

window.salvarEmailRelatorio = async function(){
  const user = auth.currentUser;
  const email = ($("emailRelatorio").value || "").trim();

  await db.collection("users").doc(user.uid).update({ emailRelatorio: email });

};

async function renderTabResultadosGerente(){
  const c = $("tabContent");
  const equipe = currentUserDoc?.equipe || "equipe1";
  const today = dayKey(nowMs());

  // puxa corretores aprovados da equipe
  const usersSnap = await db.collection("users")
    .where("role","==","corretor")
    .where("equipe","==",equipe)
    .where("status","==","aprovado")
    .get();

  const corretores = usersSnap.docs.map(d=>({ uid:d.id, ...d.data() }));

  // conta atendidos/agend/promessa por corretor (hoje)
  const rows = [];
  let equipeTotalLig = 0, equipeAtendidos=0, equipeAg=0, equipePr=0;

  for(const ctt of corretores){
    const leadsSnap = await db.collection("leads").where("corretorId","==",ctt.uid).get();
    let lig=0, at=0, ag=0, pr=0;

    leadsSnap.forEach(ds=>{
      const d = ds.data();
      if(d.timestampDistribuicao && dayKey(d.timestampDistribuicao)===today) lig++;
      if(d.atendeu===true && d.timestampFinalizacao && dayKey(d.timestampFinalizacao)===today){
        at++;
        if(d.resultado==="AGENDAMENTO") ag++;
        if(d.resultado==="PROMESSA DOCUMENTAÇÃO") pr++;
      }
    });

    equipeTotalLig += lig;
    equipeAtendidos += at;
    equipeAg += ag;
    equipePr += pr;

    rows.push({ email: ctt.email || ctt.uid, lig, at, ag, pr });
  }

  rows.sort((a,b)=> (b.ag - a.ag) || (b.at - a.at) || (b.lig - a.lig));

  c.innerHTML = `
    <div class="card">
      <div><b>Equipe ${equipe} • Hoje (${today})</b></div>
      <div class="divider"></div>
      <div class="row"><div class="grow">Total ligações</div><div><b>${equipeTotalLig}</b></div></div>
      <div class="row"><div class="grow">Atendidos</div><div><b>${equipeAtendidos}</b></div></div>
      <div class="row"><div class="grow">Agendamentos</div><div><b>${equipeAg}</b></div></div>
      <div class="row"><div class="grow">Promessas</div><div><b>${equipePr}</b></div></div>
    </div>

    <div class="card">
      <div><b>Ranking (Equipe)</b></div>
      <div class="small muted">Ordenado por Agendamentos → Atendidos → Ligações</div>
      <div class="divider"></div>
      ${rows.length ? rows.map((r,i)=>`
        <div class="row">
          <div class="grow">
            <b>${i+1}º</b> ${escapeHtml(r.email)}
            <div class="small muted">Ligações: ${r.lig} • Atendidos: ${r.at}</div>
          </div>
          <div class="pill">📅 ${r.ag}</div>
          <div class="pill">📌 ${r.pr}</div>
        </div>
        ${i<rows.length-1?`<div class="divider"></div>`:""}
      `).join("") : `<div class="center muted">Sem dados hoje.</div>`}
    </div>
  `;
}

async function renderTabResultadosDiretor(){
  const c = $("tabContent");
  const today = dayKey(nowMs());

  // gerentes aprovados
  const gerSnap = await db.collection("users")
    .where("role","==","gerente")
    .where("status","==","aprovado")
    .get();

  const gerentes = gerSnap.docs.map(d=>({ uid:d.id, ...d.data() }));

  // monta por equipe
  const equipes = {};
  for(const g of gerentes){
    const eq = g.equipe || "equipe1";
    if(!equipes[eq]) equipes[eq] = { equipe:eq, ag:0, pr:0, at:0, lig:0, gerenteEmail:g.email||g.uid };
  }

  // percorre leads do dia e soma
  const leadsSnap = await db.collection("leads").get();
  leadsSnap.forEach(ds=>{
    const d = ds.data();
    const eq = d.equipe || "equipe1";
    if(!equipes[eq]) equipes[eq] = { equipe:eq, ag:0, pr:0, at:0, lig:0, gerenteEmail:"-" };

    if(d.timestampDistribuicao && dayKey(d.timestampDistribuicao)===today) equipes[eq].lig++;
    if(d.atendeu===true && d.timestampFinalizacao && dayKey(d.timestampFinalizacao)===today){
      equipes[eq].at++;
      if(d.resultado==="AGENDAMENTO") equipes[eq].ag++;
      if(d.resultado==="PROMESSA DOCUMENTAÇÃO") equipes[eq].pr++;
    }
  });

  const rows = Object.values(equipes);
  rows.sort((a,b)=> (b.ag-a.ag) || (b.at-a.at) || (b.lig-a.lig));

  const total = rows.reduce((acc,r)=>({
    lig: acc.lig+r.lig,
    at: acc.at+r.at,
    ag: acc.ag+r.ag,
    pr: acc.pr+r.pr
  }), {lig:0,at:0,ag:0,pr:0});

  c.innerHTML = `
    <div class="card">
      <div><b>Geral • Hoje (${today})</b></div>
      <div class="divider"></div>
      <div class="row"><div class="grow">Total ligações</div><div><b>${total.lig}</b></div></div>
      <div class="row"><div class="grow">Atendidos</div><div><b>${total.at}</b></div></div>
      <div class="row"><div class="grow">Agendamentos</div><div><b>${total.ag}</b></div></div>
      <div class="row"><div class="grow">Promessas</div><div><b>${total.pr}</b></div></div>
    </div>

    <div class="card">
      <div><b>Ranking • Equipes/Gerentes</b></div>
      <div class="small muted">Ordenado por Agendamentos → Atendidos → Ligações</div>
      <div class="divider"></div>
      ${rows.length ? rows.map((r,i)=>`
        <div class="row">
          <div class="grow">
            <b>${i+1}º</b> Equipe <b>${escapeHtml(r.equipe)}</b>
            <div class="small muted">Ligações: ${r.lig} • Atendidos: ${r.at}</div>
            <div class="small muted">Gerente: ${escapeHtml(r.gerenteEmail||"-")}</div>
          </div>
          <div class="pill">📅 ${r.ag}</div>
          <div class="pill">📌 ${r.pr}</div>
        </div>
        ${i<rows.length-1?`<div class="divider"></div>`:""}
      `).join("") : `<div class="center muted">Sem dados hoje.</div>`}
    </div>
  `;
}

/** =========================
 *  Bootstrap (Auth)
 *  ========================= */
auth.onAuthStateChanged(async (user)=>{
  if(!user){
    loginTimestamp = null;
    leadAtualRef = null;
    leadAtualData = null;
    detailsOpen = false;
    excludedLeadIds = new Set();
    currentTab = "painel";
    renderLogin();
    return;
  }

  const userSnap = await db.collection("users").doc(user.uid).get();
  if(!userSnap.exists){
    renderUnauthorized("Usuário não autorizado (cadastro não encontrado em users).");
    return;
  }

  const data = userSnap.data();

  // Bloqueia pendente
  if(data.status !== "aprovado"){
    renderUnauthorized("Acesso pendente. Aguarde aprovação do gestor/diretor.");
    return;
  }

  currentRole = data.role;
  currentUserDoc = data;

  if(data.role === "diretor"){
    renderDiretorApp(user, data);
  }else if(data.role === "gerente"){
    renderGerenteApp(user, data);
  }else{
    renderCorretorApp(user, data);
  }
});
</script>
