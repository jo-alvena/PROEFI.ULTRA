<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PROEFI - ALVENA</title>

  <!-- Firebase compat -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

  <!-- XLSX -->
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

  <style>
    :root{
      --blue:#21346C;
      --gold:#BC8A0B;
      --white:#FFFFFF;

      --greenLight:#B9F6CA;
      --redLight:#FFCCCB;

      --cardShadow: 0 10px 24px rgba(0,0,0,0.14);
      --line: rgba(33,52,108,0.14);

      --navBg: rgba(255,255,255,0.12);
      --navActive: rgba(188,138,11,0.22);
      --navText: rgba(255,255,255,0.92);
    }

    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: Arial, sans-serif;
      background: var(--blue);
      color: var(--white);
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    .wrap{
      max-width: 720px;
      margin: 0 auto;
      padding: 16px 14px 110px 14px; /* espaço pro menu inferior */
    }

    .brand{
      text-align:center;
      margin: 10px 0 14px 0;
    }
    .brand h1{
      margin:0;
      font-size:28px;
      letter-spacing:0.8px;
      color: var(--gold);
      font-weight: 900;
    }
    .brand .sub{
      margin-top:6px;
      line-height:1.25;
      font-size:14px;
      opacity:0.95;
      color: var(--white);
    }

    .card{
      background: var(--white);
      color: var(--blue);
      border-radius: 16px;
      padding: 16px;
      box-shadow: var(--cardShadow);
      margin-bottom: 12px;
    }

    .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
    .grow{flex:1}
    .right{margin-left:auto}

    .divider{height:1px;background:var(--line);margin:12px 0}
    .small{font-size:12px}
    .muted{opacity:0.75}
    .center{text-align:center}
    .danger{color:#b00020;font-weight:900}
    .ok{color:#0b6b2b;font-weight:900}

    input, select, textarea{
      width:100%;
      padding: 13px 12px;
      border-radius: 12px;
      border: 1px solid rgba(33,52,108,0.22);
      font-size: 16px;
      outline:none;
    }
    textarea{min-height: 92px; resize: vertical}

    .fieldLabel{
      font-size:12px;
      opacity:0.85;
      margin-bottom: 6px;
      margin-top: 12px;
      font-weight: 800;
    }

    .pill{
      display:inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 900;
      background: rgba(188,138,11,0.14);
      color: var(--blue);
      white-space: nowrap;
    }
    .pillRed{ background: rgba(255,204,203,0.68); }
    .pillGreen{ background: rgba(185,246,202,0.72); }

    .btn{
      width:100%;
      padding: 14px 12px;
      border:none;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 900;
      cursor:pointer;
      user-select:none;
    }
    .btnGold{ background: var(--gold); color: var(--white); }
    .btnBlue{ background: var(--blue); color: var(--white); }
    .btnGreen{ background: var(--greenLight); color: var(--blue); }
    .btnRed{ background: var(--redLight); color: var(--blue); }
    .btnGhost{
      background: transparent;
      color: var(--blue);
      border: 2px solid rgba(33,52,108,0.25);
    }
    .btnSmall{
      width:auto;
      padding: 10px 12px;
      border-radius: 12px;
      font-size: 14px;
    }
    .btn:disabled{
      opacity:0.5;
      cursor:not-allowed;
    }

    .grid2{display:grid;grid-template-columns: 1fr 1fr;gap:10px}
    .grid3{display:grid;grid-template-columns: 1fr 1fr 1fr;gap:10px}
    @media(max-width:520px){
      .grid3{grid-template-columns: 1fr}
    }

    a{text-decoration:none}

    /* Menu inferior */
    .bottomNav{
      position: fixed;
      left:0; right:0; bottom:0;
      background: rgba(33,52,108,0.92);
      backdrop-filter: blur(8px);
      border-top: 1px solid rgba(255,255,255,0.18);
      padding: 10px 10px 14px 10px;
      z-index: 9999;
    }
    .navWrap{
      max-width: 720px;
      margin: 0 auto;
      display:grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 10px;
    }
    .navBtn{
      background: var(--navBg);
      border: 1px solid rgba(255,255,255,0.16);
      border-radius: 16px;
      padding: 10px 6px;
      color: var(--navText);
      text-align:center;
      font-weight: 900;
      cursor:pointer;
      min-height: 62px;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      gap: 4px;
    }
    .navBtn .ico{font-size:22px;line-height:1}
    .navBtn .txt{font-size:13px;line-height:1.05}
    .navBtn.active{
      background: var(--navActive);
      border-color: rgba(188,138,11,0.55);
    }

    /* Tabela simples */
    table{width:100%;border-collapse:collapse}
    th, td{
      border-bottom: 1px solid rgba(33,52,108,0.12);
      padding: 10px 8px;
      font-size: 12px;
      text-align:left;
      vertical-align: top;
    }
    th{font-weight: 900;}
    .kpi{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .kpiBox{
      border: 1px solid rgba(33,52,108,0.14);
      border-radius: 14px;
      padding: 12px;
      background: rgba(33,52,108,0.03);
    }
    .kpiBox .n{
      font-size: 22px;
      font-weight: 900;
      margin-top: 4px;
    }

    .sectionTitle{
      font-weight: 900;
      font-size: 14px;
      margin-bottom: 6px;
    }

    .note{
      border-left: 4px solid rgba(188,138,11,0.8);
      padding: 10px 12px;
      border-radius: 12px;
      background: rgba(188,138,11,0.10);
      font-size: 12px;
      opacity: 0.95;
    }

    .badgeInfo{
      display:inline-block;
      padding: 3px 8px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 900;
      background: rgba(33,52,108,0.12);
      color: var(--blue);
    }

    .hrMini{height:10px}
  </style>
</head>

<body>
  <div class="wrap" id="app">Carregando...</div>
  <div id="bottomNav" class="bottomNav" style="display:none">
    <div class="navWrap">
      <div class="navBtn" id="navPainel" onclick="goTab('painel')"><div class="ico">🏠</div><div class="txt">Painel</div></div>
      <div class="navBtn" id="navAtend" onclick="goTab('atendimento')"><div class="ico">📞</div><div class="txt">Atendimento</div></div>
      <div class="navBtn" id="navCrm" onclick="goTab('mini')"><div class="ico">📌</div><div class="txt">Mini CRM</div></div>
      <div class="navBtn" id="navRes" onclick="goTab('resultados')"><div class="ico">📊</div><div class="txt">Resultados</div></div>
      <div class="navBtn" id="navCfg" onclick="goTab('config')"><div class="ico">⚙️</div><div class="txt">Config</div></div>
    </div>
  </div>

<script>
/** =========================================================
 *  PROEFI - ALVENA (VERSÃO FINAL)
 *  - Login + Criação de acesso + Aprovação (Diretor/Gerente)
 *  - Leads: upload Geral/Gerente/Corretor
 *  - Distribuição / Atendimento com obrigatoriedade
 *  - Mini CRM + Resultados + Excel
 *  - Bloqueio quando PAUSADO
 *  ========================================================= */

/** =========================
 *  CONFIG FIXA (DIRETOR)
 *  ========================= */
const DIRETOR_EMAILS = ["jo.alvenasolucoes@gmail.com"]; // o seu email diretor fixo
const DEFAULT_EQUIPE = "equipe1";

/** =========================
 *  Firebase Config
 *  ========================= */
const firebaseConfig = {
  apiKey: "AIzaSyAPO-xtmzg0QMvSoDfHd6nRcmrDb7F8n6k",
  authDomain: "proefi-alvena.firebaseapp.com",
  projectId: "proefi-alvena",
  storageBucket: "proefi-alvena.firebasestorage.app",
  messagingSenderId: "1084612497727",
  appId: "1:1084612497727:web:d9b1de2962cce8123b038a",
  measurementId: "G-SZPXEMV5B4"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db   = firebase.firestore();

/** =========================
 *  STATE GLOBAL
 *  ========================= */
let APP = {
  user: null,
  userDoc: null,           // users/{uid}
  tab: "painel",
  loginTimestamp: null,    // para tempo logado do corretor (sessão)
  leadAtualRef: null,      // doc ref do lead em atendimento
  leadAtualData: null,     // dados do lead em atendimento
  detailsMode: null,       // "AGENDAMENTO" | "PROMESSA" | "SEM_INTERESSE" | null
  detailsOpen: false,
  cachedTodayAgg: null,    // cache de agregações
};

/** =========================
 *  Helpers
 *  ========================= */
function $(id){ return document.getElementById(id); }
function nowMs(){ return Date.now(); }
function escapeHtml(s){
  return String(s||"")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}
function cleanPhone(raw){ return String(raw || "").replace(/\D/g,''); }
function isDiretorEmail(email){
  return DIRETOR_EMAILS.includes(String(email||"").trim().toLowerCase());
}
function dayKey(ts){
  const d = new Date(ts);
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const da = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${da}`;
}
function timeHM(ts){
  const d = new Date(ts);
  const hh = String(d.getHours()).padStart(2,'0');
  const mm = String(d.getMinutes()).padStart(2,'0');
  return `${hh}:${mm}`;
}
function minutesBetween(a,b){
  if(!a || !b) return 0;
  return Math.max(0, Math.floor((b-a)/60000));
}
function setBottomNavVisible(v){
  $("bottomNav").style.display = v ? "block" : "none";
}
function setActiveNav(tab){
  const ids = [
    ["painel","navPainel"],
    ["atendimento","navAtend"],
    ["mini","navCrm"],
    ["resultados","navRes"],
    ["config","navCfg"],
  ];
  ids.forEach(([t,id])=>{
    const el = $(id);
    if(!el) return;
    el.classList.toggle("active", t===tab);
  });
}

/** =========================
 *  AUTH + USERS DOC (AUTO FIX)
 *  ========================= */
async function ensureUserDoc(user){
  const email = (user.email||"").trim().toLowerCase();
  const diretor = isDiretorEmail(email);

  const ref = db.collection("users").doc(user.uid);
  const snap = await ref.get();

  if(!snap.exists){
    // cria doc mínimo (pendente ou aprovado se diretor)
    await ref.set({
      email,
      role: diretor ? "diretor" : "corretor",
      status: diretor ? "aprovado" : "pendente",
      equipe: diretor ? null : DEFAULT_EQUIPE,
      ativo: false,
      mensagemPadrao: "Olá {{nome}}, aqui é da equipe Alvena. Estou tentando falar com você sobre seu interesse.",
      criadoEm: nowMs()
    });
    return (await ref.get()).data();
  }

  // força diretor sempre aprovado
  const data = snap.data() || {};
  if(diretor && (data.role !== "diretor" || data.status !== "aprovado")){
    await ref.set({ role:"diretor", status:"aprovado", atualizadoEm: nowMs() }, { merge:true });
    return (await ref.get()).data();
  }

  return data;
}

/** =========================
 *  LOGIN UI
 *  ========================= */
function renderLogin(){
  setBottomNavVisible(false);
  $("app").innerHTML = `
    <div class="brand">
      <h1>PROEFI - ALVENA</h1>
      <div class="sub">Produção Eficiente<br/>Alvena Soluções Imobiliárias</div>
    </div>

    <div class="card">
      <div class="fieldLabel">Email</div>
      <input id="email" placeholder="Digite seu email" style="border:2px solid var(--gold)" />

      <div class="fieldLabel">Senha</div>
      <input id="senha" type="password" placeholder="Digite sua senha" style="border:2px solid var(--gold)" />

      <button class="btn btnGold" style="margin-top:14px" onclick="doLogin()">ENTRAR</button>

      <div class="divider"></div>
      <div class="note">
        <b>Novo acesso?</b> Clique em <b>CRIAR ACESSO</b>.  
        Seu cadastro ficará como <b>PENDENTE</b> até aprovação do diretor/gerente.
      </div>

      <button class="btn btnBlue" style="margin-top:12px" onclick="doRegister()">CRIAR ACESSO</button>
      <div class="hrMini"></div>
      <div class="small muted center">Acesso interno • PROEFI - ALVENA</div>
    </div>
  `;
}

window.doLogin = async function(){
  const email = ($("email").value||"").trim();
  const senha = $("senha").value;
  if(!email || !senha) return alert("Preencha email e senha.");
  try{
    await auth.signInWithEmailAndPassword(email, senha);
  }catch(e){
    alert(e.message);
  }
};

window.doRegister = async function(){
  const email = ($("email").value||"").trim().toLowerCase();
  const senha = $("senha").value;
  if(!email || !senha) return alert("Preencha email e senha.");

  try{
    const cred = await auth.createUserWithEmailAndPassword(email, senha);
    const uid = cred.user.uid;

    const diretor = isDiretorEmail(email);
    await db.collection("users").doc(uid).set({
      email,
      role: diretor ? "diretor" : "corretor",
      status: diretor ? "aprovado" : "pendente",
      equipe: diretor ? null : DEFAULT_EQUIPE,
      ativo: false,
      mensagemPadrao: "Olá {{nome}}, aqui é da equipe Alvena. Estou tentando falar com você sobre seu interesse.",
      criadoEm: nowMs()
    });

    alert(diretor
      ? "Diretor criado e aprovado automaticamente."
      : "Acesso criado e aguardando aprovação do gestor/diretor."
    );

    await auth.signOut();
  }catch(e){
    const code = String(e.code||"");
    if(code.includes("email-already-in-use")){
      alert("Este email já existe. Se estiver pendente, aguarde aprovação.");
    }else{
      alert(e.message);
    }
  }
};

function renderPending(user, doc){
  setBottomNavVisible(false);
  $("app").innerHTML = `
    <div class="brand">
      <h1>PROEFI - ALVENA</h1>
      <div class="sub">Produção Eficiente<br/>Alvena Soluções Imobiliárias</div>
    </div>

    <div class="card">
      <div class="danger">Acesso pendente. Aguarde aprovação do gestor/diretor.</div>
      <div class="divider"></div>
      <div class="small muted"><b>Email:</b> ${escapeHtml(user.email||"")}</div>
      <div class="small muted"><b>Status:</b> ${escapeHtml(doc?.status||"pendente")}</div>
      <div class="small muted"><b>UID:</b> ${escapeHtml(user.uid||"")}</div>
      <div class="divider"></div>
      <button class="btn btnGold" onclick="auth.signOut()">SAIR</button>
    </div>
  `;
}

/** =========================
 *  NAV / TABS
 *  ========================= */
window.goTab = function(tab){
  if(!APP.userDoc) return;
  APP.tab = tab;
  setActiveNav(tab);
  renderApp();
};

/** =========================
 *  HEADER (Logged)
 *  ========================= */
function headerCard(){
  const role = APP.userDoc?.role || "corretor";
  const status = APP.userDoc?.status || "";
  const equipe = APP.userDoc?.equipe || "";
  const ativo = !!APP.userDoc?.ativo;

  const roleLabel =
    role === "diretor" ? "DIRETOR" :
    role === "gerente" ? "GERENTE" : "CORRETOR";

  const badgeAtivo = (role === "corretor")
    ? (ativo ? `<span class="pill pillGreen">ATIVO</span>` : `<span class="pill pillRed">PAUSADO</span>`)
    : (equipe ? `<span class="pill">Equipe: ${escapeHtml(equipe)}</span>` : `<span class="pill">ADMIN</span>`);

  return `
    <div class="brand">
      <h1>PROEFI - ALVENA</h1>
      <div class="sub">Produção Eficiente<br/>Alvena Soluções Imobiliárias</div>
    </div>

    <div class="card">
      <div class="row">
        <div class="grow">
          <div><b>${roleLabel}</b> <span class="badgeInfo">${escapeHtml(status)}</span></div>
          <div class="small muted">${escapeHtml(APP.user?.email||"")}</div>
        </div>
        <div class="right">${badgeAtivo}</div>
      </div>
      <div class="divider"></div>
      <div class="row">
        <button class="btn btnGold btnSmall" onclick="auth.signOut()">SAIR</button>
        ${role === "corretor" ? `<button class="btn btnBlue btnSmall" onclick="syncUserDoc()">ATUALIZAR</button>` : `<button class="btn btnBlue btnSmall" onclick="syncUserDoc()">ATUALIZAR</button>`}
      </div>
    </div>
  `;
}

/** =========================
 *  USER DOC SYNC
 *  ========================= */
async function syncUserDoc(){
  const snap = await db.collection("users").doc(APP.user.uid).get();
  APP.userDoc = snap.exists ? (snap.data()||{}) : null;
  renderApp();
}

/** =========================
 *  Painel (por role)
 *  ========================= */
function painelCorretor(){

      <div class="divider"></div>
      <div class="grid2">
        <button class="btn btnGreen" onclick="setMeActive(true)">🟢 ESTOU ATIVO</button>

      <select id="leadSource">

        <option value="minha">Minha Lista (Corretor)</option>
      </select>

      <div class="divider"></div>

      <div class="grid2">
        <button class="btn btnGold" onclick="pegarProximoLead()">PEGAR PRÓXIMO LEAD</button>
        <button class="btn btnGhost" onclick="trocarLista()">TROCAR LISTA</button>

/** =========================
 *  Atendimento
 *  ========================= */
function atendimentoCorretor(){
  const ativo = !!APP.userDoc.ativo;
  const hasLead = !!APP.leadAtualData;

  const bloqueado = !ativo;
  const msgBloq = bloqueado
    ? `<div class="note"><b>Você está PAUSADO.</b> Para atender, clique em <b>ESTOU ATIVO</b>. Se tiver lead preso, você pode <b>DEVOLVER</b>.</div>`
    : "";

  return `
    <div class="card">
      <div class="sectionTitle">Atendimento</div>
      <div class="small muted">Foco: ligar + mensagens rápidas (WhatsApp/SMS/Email).</div>

/** =========================
 *  Upload & Import (XLS/XLSX/CSV)
 *  ========================= */
function parseSheetRows(workbook){
  const sheetName = workbook.SheetNames[0];
  const ws = workbook.Sheets[sheetName];
  const rows = XLSX.utils.sheet_to_json(ws, { header: 1, raw: false, defval: "" });
  const clean = rows.filter(r => r && r.some(cell => String(cell).trim() !== ""));
  return clean;
}
function detectHeaderRow(rows){
  const keys = ["nome","telefone","celular","contato","email","e-mail"];
  for(let i=0;i<Math.min(5, rows.length);i++){
    const row = rows[i].map(c=>String(c).toLowerCase().trim());
    if(row.some(c => keys.includes(c))) return i;
  }
  return 0;
}
function mapLeadColumns(row){
  const nome = String(row[0] || "").trim();
  const telefone = String(row[1] || "").trim();
  const email = String(row[2] || "").trim();
  return { nome, telefone, email };
}
function makeLeadDoc(base){
  return {
    nome: base.nome || "",
    telefone: base.telefone || "",
    email: base.email || "",
    status: "fila",
    corretorId: null,
    criadoEm: nowMs(),
    atualizadoEm: nowMs(),

    emAtendimentoEm: null,
    timestampDistribuicao: null,
    timestampFinalizacao: null,

    atendeu: null,
    resultado: null,
    observacao: null,
    dataAgendada: null,

    totalTentativas: 0,

    origem: null,        // geral | gerente | corretor
    equipe: null,        // string
    donoUpload: null,    // uid
    listaRef: null       // id da lista
  };
}

async function uploadLeadsFromFile({ file, origem, equipe, donoUploadUid, distribuirGeralAgora }){
  const arrayBuffer = await file.arrayBuffer();
  const workbook = XLSX.read(arrayBuffer, { type: "array" });
  const rows = parseSheetRows(workbook);
  if(rows.length === 0) throw new Error("Planilha vazia.");

  const headerIndex = detectHeaderRow(rows);
  const dataRows = rows.slice(headerIndex + 1);

  const parsed = [];
  for(const r of dataRows){
    const lead = mapLeadColumns(r);
    if(!lead.nome && !lead.telefone && !lead.email) continue;
    if(!lead.telefone) continue;
    parsed.push(lead);
  }
  if(parsed.length === 0) throw new Error("Nenhum lead válido (verifique colunas A/B/C).");

  const listaDoc = await db.collection("listas").add({
    origem,
    equipe: equipe || null,
    donoUpload: donoUploadUid,
    arquivoNome: file.name,
    total: parsed.length,
    criadoEm: nowMs()
  });
  const listaRefId = listaDoc.id;

  let corretoresAtivos = [];
  if(origem === "geral" && distribuirGeralAgora){
    const snap = await db.collection("users")
      .where("role","==","corretor")
      .where("ativo","==",true)
      .where("status","==","aprovado")
      .get();
    corretoresAtivos = snap.docs.map(d => ({ uid: d.id, ...(d.data()||{}) }));
    if(corretoresAtivos.length === 0){
      throw new Error("Nenhum corretor ATIVO e APROVADO no momento. Peça para os corretores clicarem 'ESTOU ATIVO' antes do upload.");
    }
  }

  const batchSize = 350; // seguro para Firestore
  let idx = 0;

  while(idx < parsed.length){
    const batch = db.batch();
    const slice = parsed.slice(idx, idx + batchSize);

    for(const leadBase of slice){
      const docRef = db.collection("leads").doc();
      const doc = makeLeadDoc(leadBase);

      doc.origem = origem;
      doc.equipe = equipe || null;
      doc.donoUpload = donoUploadUid;
      doc.listaRef = listaRefId;

      if(origem === "geral" && distribuirGeralAgora){
        const chosen = corretoresAtivos[Math.floor(Math.random() * corretoresAtivos.length)];
        doc.corretorId = chosen.uid; // já atribui
        doc.status = "fila";
      }

      batch.set(docRef, doc);
    }

    await batch.commit();
    idx += batchSize;
  }

  return { total: parsed.length, listaRefId };
}

/** =========================
 *  Lead selection (próximo lead)
 *  - geral: fila com corretorId == uid
 *  - gerente: fila da equipe corretorId == null
 *  - minha: fila donoUpload == uid e corretorId == null
 *  - evita repetir lead devolvido: usa campo totalTentativas e timestampDistribuicao
 *  ========================= */
async function pickNextLeadForCorretor({ source, corretorUid, equipeCorretor }){
  let q = db.collection("leads").where("status","==","fila");

  if(source === "geral"){
    q = q.where("origem","==","geral").where("corretorId","==",corretorUid);
  }else if(source === "gerente"){
    q = q.where("origem","==","gerente").where("equipe","==",equipeCorretor).where("corretorId","==",null);
  }else{
    q = q.where("origem","==","corretor").where("donoUpload","==",corretorUid).where("corretorId","==",null);
  }

  // pega alguns candidatos e escolhe aleatório no cliente
  const snap = await q.limit(15).get();
  if(snap.empty) return null;

  const docs = snap.docs;
  const chosenSnap = docs[Math.floor(Math.random() * docs.length)];
  const ref = chosenSnap.ref;

  await ref.update({
    status: "em atendimento",
    corretorId: corretorUid,
    emAtendimentoEm: nowMs(),
    timestampDistribuicao: nowMs(),
    atualizadoEm: nowMs(),
    totalTentativas: firebase.firestore.FieldValue.increment(1)
  });

  const fresh = await ref.get();
  return { ref, data: fresh.data() };
}

window.pegarProximoLead = async function(){
  if(APP.userDoc.role !== "corretor") return;
  if(!requireAtivoParaOperar()) return;

  if(APP.leadAtualRef) return alert("Você já está com um lead em atendimento. Finalize ou devolva antes de pegar outro.");

  const source = $("leadSource")?.value || "geral";
  const equipe = APP.userDoc.equipe || DEFAULT_EQUIPE;

  const picked = await pickNextLeadForCorretor({
    source, corretorUid: APP.user.uid, equipeCorretor: equipe
  });

  if(!picked){
    alert("Sem leads disponíveis nessa fonte.");
    return;
  }

  APP.leadAtualRef = picked.ref;
  APP.leadAtualData = picked.data;
  APP.detailsMode = null;
  APP.detailsOpen = false;

  APP.tab = "atendimento";
  renderApp();
  renderLeadInArea();
};

 *  - ATENDEU -> abre opções clicáveis (toggle)
 *  ========================= */
window.uiNaoAtendeu = async function(silent=false){
  if(!APP.leadAtualRef) return;

  // devolve para fila
  await APP.leadAtualRef.update({
    status: "fila",
    // Se origem geral: mantém corretorId atribuído (para voltar sempre para este corretor)
    // Se origem gerente/minha: volta para pool (corretorId null)
    corretorId: (APP.leadAtualData?.origem === "geral") ? APP.user.uid : null,
    emAtendimentoEm: null,
    timestampFinalizacao: null,
    atendeu: false,
    resultado: null,
    observacao: null,
    dataAgendada: null,
    atualizadoEm: nowMs()
  });

  APP.leadAtualRef = null;
  APP.leadAtualData = null;
  APP.detailsMode = null;
  APP.detailsOpen = false;

  if(!silent) {
    // puxa outro automaticamente se estiver ATIVO
    if(APP.userDoc.ativo){
      await pegarProximoLead();
      return;
    }else{
      alert("Lead devolvido para fila. Você está PAUSADO.");
    }
  }

  renderApp();

window.confirmarAtendeu = async function(resultado){
  if(!APP.leadAtualRef) return;
  if(!requireAtivoParaOperar()) return;

  // confirmação final
  const ok = confirm("Confirmar e salvar este resultado?");
  if(!ok) return;

  let dataAgendada = null;
  let obs = null;

  if(resultado === "AGENDAMENTO"){
    const d = ($("agData").value || "").trim();
    const h = ($("agHora").value || "").trim();
    if(!d || !h) return alert("Preencha data e horário do agendamento.");
    dataAgendada = `${d} ${h}`;
    obs = ($("obsAg").value || "").trim();
  }else if(resultado === "PROMESSA DOCUMENTAÇÃO"){
    obs = ($("obsPr").value || "").trim();
  }else{
    const fb = ($("fb").value || "").trim();
    if(!fb) return alert("Feedback é obrigatório.");
    obs = fb;
  }

  await APP.leadAtualRef.update({
    status: "finalizado",
    atendeu: true,
    resultado,
    observacao: obs || null,
    dataAgendada: dataAgendada,
    timestampFinalizacao: nowMs(),
    atualizadoEm: nowMs()
  });

  APP.leadAtualRef = null;
  APP.leadAtualData = null;
  APP.detailsMode = null;
  APP.detailsOpen = false;

  // puxa outro automaticamente se estiver ATIVO
  if(APP.userDoc.ativo){
    await pegarProximoLead();
    return;
  }

  renderApp();
};

/** =========================
 *  Mini CRM load
 *  ========================= */
async function loadMiniCRM(){
  const box = $("miniBox");
  if(!box) return;

  const today = dayKey(nowMs());
  const role = APP.userDoc.role;

  let q = db.collection("leads")
    .where("atendeu","==",true);

  // filtra por dia finalização
  // (não existe where por dayKey; então filtramos mais amplo e filtramos no cliente)
  // Para evitar excesso, limitamos:
  if(role === "corretor"){
    q = q.where("corretorId","==",APP.user.uid);
  }else if(role === "gerente"){
    const equipe = APP.userDoc.equipe || DEFAULT_EQUIPE;
    q = q.where("equipe","==",equipe);
  }else{
    // diretor: sem filtro adicional
  }

  const snap = await q.limit(500).get();
  const rows = [];
  snap.forEach(ds=>{
    const d = ds.data() || {};
    if(!d.timestampFinalizacao) return;
    if(dayKey(d.timestampFinalizacao) !== today) return;
    if(d.resultado !== "AGENDAMENTO" && d.resultado !== "PROMESSA DOCUMENTAÇÃO") return;
    rows.push({ id: ds.id, ...d });
  });

  rows.sort((a,b)=>(b.timestampFinalizacao||0)-(a.timestampFinalizacao||0));

  if(rows.length === 0){
    box.innerHTML = `<div class="small muted">Sem promessas/agendamentos hoje.</div>`;
    return;
  }

  const canEdit = (role === "corretor"); // você pediu corretor poder ajustar aqui
  const canDelete = (role === "corretor");

  box.innerHTML = `
    <table>
      <thead>
        <tr>
          <th>Cliente</th>
          <th>Resultado</th>
          <th>Agendamento</th>
          <th>Obs</th>
          ${canEdit || canDelete ? "<th>Ação</th>" : ""}
        </tr>
      </thead>
      <tbody>
        ${rows.map(r=>{
          const ag = r.dataAgendada ? escapeHtml(r.dataAgendada) : "-";
          const obs = r.observacao ? escapeHtml(r.observacao) : "-";
          return `
            <tr>
              <td>
                <b>${escapeHtml(r.nome||"")}</b><br/>
                <span class="small muted">${escapeHtml(r.telefone||"")}</span>
              </td>
              <td>${escapeHtml(r.resultado||"")}</td>
              <td>${ag}</td>
              <td>${obs}</td>
              ${canEdit || canDelete ? `
                <td>
                  ${canEdit ? `
                    <select id="editRes_${r.id}" style="font-size:12px;padding:8px;border-radius:10px">
                      <option value="AGENDAMENTO" ${r.resultado==="AGENDAMENTO"?"selected":""}>AGENDAMENTO</option>
                      <option value="PROMESSA DOCUMENTAÇÃO" ${r.resultado==="PROMESSA DOCUMENTAÇÃO"?"selected":""}>PROMESSA</option>
                    </select>
                    <button class="btn btnBlue btnSmall" style="margin-top:6px" onclick="salvarMiniCRM('${r.id}')">Salvar</button>
                  `:""}
                  ${canDelete ? `<button class="btn btnRed btnSmall" style="margin-top:6px" onclick="excluirLead('${r.id}')">Excluir</button>`:""}
                </td>
              `:""}
            </tr>
          `;
        }).join("")}
      </tbody>
    </table>
  `;
}

window.salvarMiniCRM = async function(leadId){
  const sel = $(`editRes_${leadId}`);
  if(!sel) return;

  await db.collection("leads").doc(leadId).update({

window.excluirLead = async function(leadId){
  const ok = confirm("Excluir este lead do sistema? (Ação irreversível)");
  if(!ok) return;
  await db.collection("leads").doc(leadId).delete();
  loadMiniCRM();
};

/** =========================
 *  Resultados / Rankings load
 *  ========================= */
async function aggregateToday(){
  const today = dayKey(nowMs());
  const role = APP.userDoc.role;

  // Busca leads distribuídos e finalizados hoje
  // - tentativas: timestampDistribuicao hoje e corretorId != null
  // - atendidos: timestampFinalizacao hoje, atendeu true
  // Para o volume típico (30 corretores), isso funciona.

  let baseQ = db.collection("leads").limit(1200);
  const snap = await baseQ.get();

  const byCorretor = {}; // uid -> agg
  const byEquipe = {};   // equipe -> agg
  const byGerente = {};  // gerenteUid -> agg (para diretor: agrupamos por equipe e encontramos gerente do users)

  snap.forEach(ds=>{
    const d = ds.data() || {};
    const corr = d.corretorId || null;
    const equipe = d.equipe || DEFAULT_EQUIPE;

    const distOk = d.timestampDistribuicao && dayKey(d.timestampDistribuicao) === today;
    const finOk  = d.timestampFinalizacao && dayKey(d.timestampFinalizacao) === today;

    if(corr){
      if(!byCorretor[corr]){
        byCorretor[corr] = { tentativas:0, naoAtendeu:0, atendidos:0, agend:0, promessa:0, sem:0 };
      }
      if(distOk) byCorretor[corr].tentativas += 1;
      if(distOk && d.atendeu === false) byCorretor[corr].naoAtendeu += 1;

      if(finOk && d.atendeu === true){
        byCorretor[corr].atendidos += 1;
        if(d.resultado === "AGENDAMENTO") byCorretor[corr].agend += 1;
        else if(d.resultado === "PROMESSA DOCUMENTAÇÃO") byCorretor[corr].promessa += 1;
        else if(d.resultado === "NÃO GEROU INTERESSE") byCorretor[corr].sem += 1;
      }
    }

    if(!byEquipe[equipe]){
      byEquipe[equipe] = { tentativas:0, atendidos:0, agend:0, promessa:0 };
    }
    if(distOk && corr) byEquipe[equipe].tentativas += 1;
    if(finOk && d.atendeu === true){
      byEquipe[equipe].atendidos += 1;
      if(d.resultado === "AGENDAMENTO") byEquipe[equipe].agend += 1;
      if(d.resultado === "PROMESSA DOCUMENTAÇÃO") byEquipe[equipe].promessa += 1;
    }
  });

  // Carrega users para nomes/emails e gerentes por equipe
  const usersSnap = await db.collection("users").get();
  const users = {};
  const gerentePorEquipe = {};
  usersSnap.forEach(u=>{
    const data = u.data() || {};
    users[u.id] = data;
    if(data.role === "gerente"){
      const eq = data.equipe || DEFAULT_EQUIPE;
      gerentePorEquipe[eq] = { uid: u.id, ...data };
    }
  });

  // byGerente = agregação por equipe do gerente
  Object.keys(byEquipe).forEach(eq=>{
    const g = gerentePorEquipe[eq];
    const key = g ? g.uid : ("SEM_GERENTE_"+eq);
    if(!byGerente[key]){
      byGerente[key] = { equipe:eq, tentativas:0, atendidos:0, agend:0, promessa:0, gerenteEmail: g?.email || "Sem gerente" };
    }
    byGerente[key].tentativas += byEquipe[eq].tentativas;
    byGerente[key].atendidos += byEquipe[eq].atendidos;
    byGerente[key].agend += byEquipe[eq].agend;
    byGerente[key].promessa += byEquipe[eq].promessa;
  });

  return { today, users, byCorretor, byEquipe, byGerente };
}

window.gerarRelatorioExcel = async function(){
  if(APP.userDoc.role !== "corretor") return;

  const today = dayKey(nowMs());

  const snap = await db.collection("leads")
    .where("corretorId","==",APP.user.uid)
    .limit(1200)
    .get();

  if(snap.empty) return alert("Sem registros para relatório.");

  let totalLigacoes = 0;
  let totalNaoAtendeu = 0;
  let totalAtendidos = 0;
  let totalAgend = 0;
  let totalPromessa = 0;
  let totalSemInteresse = 0;

  const atendidosRows = [];

  snap.forEach(ds=>{
    const d = ds.data() || {};
    const distOk = d.timestampDistribuicao && dayKey(d.timestampDistribuicao) === today;
    const finOk  = d.timestampFinalizacao && dayKey(d.timestampFinalizacao) === today;

    if(distOk){
      totalLigacoes += 1;
      if(d.atendeu === false) totalNaoAtendeu += 1;
    }

    if(finOk && d.atendeu === true){
      totalAtendidos += 1;
      if(d.resultado === "AGENDAMENTO") totalAgend += 1;
      else if(d.resultado === "PROMESSA DOCUMENTAÇÃO") totalPromessa += 1;
      else if(d.resultado === "NÃO GEROU INTERESSE") totalSemInteresse += 1;

      const tempoMin = minutesBetween(d.timestampDistribuicao, d.timestampFinalizacao);

      atendidosRows.push({
        Cliente: d.nome || "",
        Telefone: d.telefone || "",
        Email: d.email || "",
        Resultado: d.resultado || "",
        "Data/Hora Agendada": d.dataAgendada || "",
        Feedback: d.observacao || "",
        "Tempo Atendimento (min)": tempoMin
      });
    }
  });

  const tempoLogadoMin = APP.loginTimestamp ? minutesBetween(APP.loginTimestamp, nowMs()) : 0;

  const resumo = [
    ["Operador", APP.user.email],
    ["Equipe", APP.userDoc.equipe || ""],
    ["Tempo total logado (min)", tempoLogadoMin],
    ["Total de ligações (tentativas)", totalLigacoes],
    ["Total NÃO atendeu", totalNaoAtendeu],
    ["Total ATENDIDOS", totalAtendidos],
    ["Agendamentos", totalAgend],
    ["Promessa documentação", totalPromessa],
    ["Não gerou interesse", totalSemInteresse],
    ["Data", today]
  ];

  const wsResumo = XLSX.utils.aoa_to_sheet(resumo);
  const wsAtend  = XLSX.utils.json_to_sheet(atendidosRows);

  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, wsResumo, "Resumo");
  XLSX.utils.book_append_sheet(wb, wsAtend, "Atendidos");

  XLSX.writeFile(wb, `PROEFI_RELATORIO_${today}.xlsx`);
  alert("Relatório Excel gerado (baixado no dispositivo).");
};

  if(gsnap.empty){

  window.location.href = `mailto:${encodeURIComponent(to)}?subject=${subject}&body=${body}`;
};

window.exportRankingEquipeExcel = async function(){
  const agg = APP.cachedTodayAgg || await aggregateToday();
  const eq = APP.userDoc.equipe || DEFAULT_EQUIPE;
  const rows = Object.entries(agg.byCorretor).map(([uid, v])=>{
    const u = agg.users[uid] || {};
    if((u.equipe || DEFAULT_EQUIPE) !== eq) return null;
    return { Corretor: u.email || uid, ...v };
  }).filter(Boolean);

  const ws = XLSX.utils.json_to_sheet(rows);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "RankingEquipe");
  XLSX.writeFile(wb, `PROEFI_RANKING_EQUIPE_${eq}_${agg.today}.xlsx`);
};

/** =========================
 *  Aprovações (Diretor/Gerente)
 *  ========================= */
async function loadAprovacoes(){
  const box = $("aproBox");
  if(!box) return;

  box.innerHTML = `<div class="small muted">Carregando...</div>`;
  const role = APP.userDoc.role;

  let snap;
  if(role === "diretor"){
    snap = await db.collection("users").where("status","==","pendente").get();
  }else{
    const eq = APP.userDoc.equipe || DEFAULT_EQUIPE;
    snap = await db.collection("users")
      .where("status","==","pendente")
      .where("equipe","==",eq)
      .get();
  }

  if(snap.empty){
    box.innerHTML = `<div class="small muted">Sem acessos pendentes.</div>`;
    return;
  }

  const rows = snap.docs.map(d=>({ uid:d.id, ...(d.data()||{}) }));
  rows.sort((a,b)=>String(a.email||"").localeCompare(String(b.email||"")));

  box.innerHTML = `
    <table>
      <thead><tr><th>Email</th><th>Equipe</th><th>Role</th><th>Ação</th></tr></thead>
      <tbody>
        ${rows.map(r=>`
          <tr>
            <td><b>${escapeHtml(r.email||"")}</b><div class="small muted">${escapeHtml(r.uid)}</div></td>
            <td>${escapeHtml(r.equipe||"-")}</td>
            <td>${escapeHtml(r.role||"corretor")}</td>
            <td>
              <button class="btn btnGreen btnSmall" onclick="aprovarAcesso('${r.uid}')">Aprovar</button>
              <button class="btn btnRed btnSmall" style="margin-top:6px" onclick="reprovarAcesso('${r.uid}')">Reprovar</button>
            </td>
          </tr>
        `).join("")}
      </tbody>
    </table>
  `;
}

window.aprovarAcesso = async function(uid){
  const ok = confirm("Aprovar este acesso?");
  if(!ok) return;
  await db.collection("users").doc(uid).update({ status:"aprovado", aprovadoEm: nowMs() });
  alert("Aprovado!");
  loadAprovacoes();
};

window.reprovarAcesso = async function(uid){
  const ok = confirm("Reprovar este acesso? (ele continuará sem acesso)");
  if(!ok) return;
  await db.collection("users").doc(uid).update({ status:"reprovado", reprovadoEm: nowMs() });
  alert("Reprovado!");
  loadAprovacoes();
};

/** =========================
 *  Limpar leads (Diretor)
 *  ========================= */
window.limparLeadsComConfirmacao = async function(){
  if(APP.userDoc.role !== "diretor") return;
  const ok1 = confirm("ATENÇÃO: Isso vai apagar TODOS os leads. Confirmar?");
  if(!ok1) return;
  const ok2 = confirm("Confirma novamente? (irreversível)");
  if(!ok2) return;
  await limparTodosLeads();
};

async function limparTodosLeads(){
  // apaga em lotes
  let total = 0;
  while(true){
    const snap = await db.collection("leads").limit(300).get();
    if(snap.empty) break;
    const batch = db.batch();
    snap.docs.forEach(d=>batch.delete(d.ref));
    await batch.commit();
    total += snap.size;
  }
  alert(`Leads apagados: ${total}`);
}

/** =========================
 *  Bootstrap
 *  ========================= */
auth.onAuthStateChanged(async (user)=>{
  if(!user){
    APP = { user:null, userDoc:null, tab:"painel", loginTimestamp:null, leadAtualRef:null, leadAtualData:null, detailsMode:null, detailsOpen:false, cachedTodayAgg:null };
    renderLogin();
    return;
  }

  APP.user = user;
  APP.userDoc = await ensureUserDoc(user);

  // se pendente, trava
  if(APP.userDoc.status !== "aprovado"){
    renderPending(user, APP.userDoc);
    return;
  }

  // sessão
  if(APP.userDoc.role === "corretor"){
    APP.loginTimestamp = nowMs();
  }else{
    APP.loginTimestamp = null;
  }

  // inicia no Painel
  APP.tab = "painel";

  // tenta recuperar lead preso em atendimento (se existir)
  try{
    if(APP.userDoc.role === "corretor"){
      const snap = await db.collection("leads")
        .where("status","==","em atendimento")
        .where("corretorId","==",APP.user.uid)
        .limit(1)
        .get();
      if(!snap.empty){
        APP.leadAtualRef = snap.docs[0].ref;
        APP.leadAtualData = snap.docs[0].data();
      }
    }
  }catch(e){
    // ignora
  }

  renderApp();
});
</script>
