<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PROEFI - ALVENA</title>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<style>
body{
 margin:0;
 font-family:Arial;
 background:#21346C;
 color:white;
}
.wrap{max-width:520px;margin:auto;padding:12px;}
.card{
 background:white;
 color:#21346C;
 padding:12px;
 border-radius:12px;
 margin-bottom:10px;
}
.btn{
 width:100%;
 padding:14px;
 border:none;
 border-radius:10px;
 font-weight:bold;
 margin-top:8px;
}
.btnBlue{background:#21346C;color:white;}
.btnGold{background:#BC8A0B;color:white;}
.btnGreen{background:#B9F6CA;}
.btnRed{background:#FFCCCB;}

.menu{
 position:fixed;
 bottom:0;left:0;right:0;
 display:flex;
 background:white;
 border-top:1px solid #ccc;
}
.menu button{
 flex:1;
 padding:20px;
 font-size:16px;
 font-weight:bold;
 border:none;
 background:white;
}
</style>
</head>

<body>
<div class="wrap" id="app">Carregando...</div>

<script>

/* ===== FIREBASE ===== */
const firebaseConfig={
 apiKey:"AIzaSyAPO-xtmzg0QMvSoDfHd6nRcmrDb7F8n6k",
 authDomain:"proefi-alvena.firebaseapp.com",
 projectId:"proefi-alvena",
 storageBucket:"proefi-alvena.firebasestorage.app",
 messagingSenderId:"1084612497727",
 appId:"1:1084612497727:web:d9b1de2962cce8123b038a"
};

firebase.initializeApp(firebaseConfig);
const auth=firebase.auth();
const db=firebase.firestore();

/* ===== STATE ===== */
let userData=null;
let leadAtual=null;

/* ===== HELPERS ===== */
function $(id){return document.getElementById(id);}
function cleanPhone(v){return String(v||"").replace(/\D/g,"");}

/* ===== LOGIN ===== */
function renderLogin(){
 $("app").innerHTML=`
 <div class="card">
   <h2>PROEFI - ALVENA</h2>
   <div>Produção Eficiente<br>Alvena Soluções Imobiliárias</div>
   <br>
   <input id="email" placeholder="Email" style="width:100%;padding:10px"><br><br>
   <input id="senha" type="password" placeholder="Senha" style="width:100%;padding:10px">
   <button class="btn btnGold" onclick="doLogin()">ENTRAR</button>
 </div>`;
}

async function doLogin(){
 try{
   await auth.signInWithEmailAndPassword(
     $("email").value,
     $("senha").value
   );
 }catch(e){alert(e.message);}
}
window.doLogin=doLogin;

/* ===== APP ===== */
function renderApp(){
 $("app").innerHTML=`
 <div id="view"></div>

 <div class="menu">
   <button onclick="goTab('painel')">🏠</button>
   <button onclick="goTab('atendimento')">☎️</button>
   <button onclick="goTab('resultados')">📊</button>
   <button onclick="goTab('config')">⚙️</button>
 </div>
 `;
 goTab("painel");
}

function goTab(tab){
 if(tab==="painel") renderPainel();
 if(tab==="atendimento") renderAtendimento();
 if(tab==="resultados") renderResultados();
 if(tab==="config") renderConfig();
}
window.goTab=goTab;

/* ===== PAINEL ===== */
function renderPainel(){
 $("view").innerHTML=`
 <div class="card">
   <h2>Painel</h2>
   <button class="btn btnGreen" onclick="setAtivo(true)">ATIVO</button>
   <button class="btn btnRed" onclick="setAtivo(false)">PAUSADO</button>
 </div>`;
}

async function setAtivo(v){
 await db.collection("users")
 .doc(auth.currentUser.uid)
 .update({ativo:v});
}
window.setAtivo=setAtivo;

/* ===== ATENDIMENTO ===== */
function renderAtendimento(){
 $("view").innerHTML=`
 <div class="card">
 <h2>Atendimento</h2>

 <select id="fonte" style="width:100%;padding:10px">
   <option value="geral">Lista Geral</option>
   <option value="gerente">Lista Gerente</option>
   <option value="minha">Minha Lista</option>
 </select>

 <button class="btn btnGold" onclick="pegarLead()">PEGAR LEAD</button>

 <div id="leadBox"></div>
 </div>`;
}

async function pegarLead(){

 const snap=await db.collection("leads")
 .where("status","==","fila")
 .limit(1).get();

 if(snap.empty){
   $("leadBox").innerHTML="Sem leads.";
   return;
 }

 const doc=snap.docs[0];
 leadAtual={id:doc.id,...doc.data()};

 await doc.ref.update({
   status:"em atendimento",
   corretorId:auth.currentUser.uid
 });

 renderLead();
}
window.pegarLead=pegarLead;

function renderLead(){

 const tel=cleanPhone(leadAtual.telefone);
 const msg=encodeURIComponent(userData.mensagemPadrao||"");

 $("leadBox").innerHTML=`
 <h3>${leadAtual.nome||""}</h3>
 <div>${leadAtual.telefone||""}</div>
 <div>${leadAtual.email||""}</div>

 <a href="tel:${tel}">
 <button class="btn btnBlue">📞 LIGAR</button></a>

 <a target="_blank"
 href="https://wa.me/55${tel}?text=${msg}">
 <button class="btn btnBlue">💬 WHATSAPP</button></a>

 <a href="sms:${tel}?body=${msg}">
 <button class="btn btnBlue">📩 SMS</button></a>

 <a href="mailto:${leadAtual.email||""}?subject=PROEFI&body=${msg}">
 <button class="btn btnBlue">📧 EMAIL</button></a>

 <button class="btn btnGreen" onclick="finalizar('AGENDAMENTO')">
 FINALIZAR AGENDAMENTO
 </button>

 <button class="btn btnGold" onclick="finalizar('PROMESSA')">
 FINALIZAR PROMESSA
 </button>

 <button class="btn btnRed" onclick="naoAtendeu()">
 NÃO ATENDEU
 </button>
 `;
}

/* ===== FINALIZAÇÃO ===== */
async function finalizar(tipo){
 if(!leadAtual) return;

 await db.collection("leads")
 .doc(leadAtual.id)
 .update({
   status:"finalizado",
   resultado:tipo,
   atendeu:true,
   timestampFinalizacao:Date.now()
 });

 leadAtual=null;
 renderAtendimento();
}
window.finalizar=finalizar;

async function naoAtendeu(){
 if(!leadAtual) return;

 await db.collection("leads")
 .doc(leadAtual.id)
 .update({
   status:"fila",
   corretorId:null
 });

 leadAtual=null;
 renderAtendimento();
}
window.naoAtendeu=naoAtendeu;

/* ===== RESULTADOS ===== */
function renderResultados(){
 $("view").innerHTML=`
 <div class="card">
 <h2>Resultados</h2>
 Mini CRM (próxima etapa)
 </div>`;
}

/* ===== CONFIG ===== */
function renderConfig(){
 $("view").innerHTML=`
 <div class="card">
 <h2>Mensagem padrão</h2>
 <textarea id="msg"
 style="width:100%;height:80px">${userData.mensagemPadrao||""}</textarea>

 <button class="btn btnBlue" onclick="salvarMsg()">SALVAR</button>
 </div>`;
}

async function salvarMsg(){
 await db.collection("users")
 .doc(auth.currentUser.uid)
 .update({mensagemPadrao:$("msg").value});

 userData.mensagemPadrao=$("msg").value;
 alert("Mensagem salva");
}
window.salvarMsg=salvarMsg;

/* ===== AUTH ===== */
auth.onAuthStateChanged(async user=>{

 if(!user){
   renderLogin();
   return;
 }

 const doc=await db.collection("users")
 .doc(user.uid).get();

 if(!doc.exists){
   alert("Usuário não autorizado");
   auth.signOut();
   return;
 }

 userData=doc.data();
 renderApp();
});

</script>
</body>
</html>
