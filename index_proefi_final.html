function dayKeyFromMs(ts){
  const d = new Date(ts);
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const da = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${da}`;
}
function startOfDayMs(yyyy_mm_dd){
  const [y,m,d] = yyyy_mm_dd.split("-").map(Number);
  return new Date(y, m-1, d, 0,0,0,0).getTime();
}
function endOfDayMs(yyyy_mm_dd){
  const [y,m,d] = yyyy_mm_dd.split("-").map(Number);
  return new Date(y, m-1, d, 23,59,59,999).getTime();
}
function clampStr(s, n){ s=String(s||""); return s.length>n ? s.slice(0,n-1)+"…" : s; }

/* =========================
   Som “PIX / Sucesso” (WebAudio)
   ========================= */
let audioCtx = null;
function playPixSuccess(){
  try{
    if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
    const ctx = audioCtx;
    const now = ctx.currentTime;

    const o1 = ctx.createOscillator();
    const o2 = ctx.createOscillator();
    const g  = ctx.createGain();

    o1.type = "sine"; o2.type="triangle";
    o1.frequency.setValueAtTime(880, now);
    o2.frequency.setValueAtTime(1320, now);

    g.gain.setValueAtTime(0.0001, now);
    g.gain.exponentialRampToValueAtTime(0.25, now + 0.02);
    g.gain.exponentialRampToValueAtTime(0.0001, now + 0.22);

    o1.connect(g); o2.connect(g);
    g.connect(ctx.destination);

    o1.start(now); o2.start(now);
    o1.stop(now + 0.25); o2.stop(now + 0.25);
  }catch(e){}
}

/* =========================
   Upload parsing
   ========================= */
function parseSheetRows(workbook){
  const sheetName = workbook.SheetNames[0];
  const ws = workbook.Sheets[sheetName];
  const rows = XLSX.utils.sheet_to_json(ws, { header: 1, raw: false, defval: "" });
  const clean = rows.filter(r => r && r.some(cell => String(cell).trim() !== ""));
  return clean;
}
function detectHeaderRow(rows){
  const keys = ["nome","telefone","celular","contato","email","e-mail"];
  for(let i=0;i<Math.min(5, rows.length);i++){
    const row = rows[i].map(c=>String(c).toLowerCase().trim());
    const hit = row.some(c => keys.includes(c));
    if(hit) return i;
  }
  return 0;
}
function mapLeadColumns(row){
  const nome = String(row[0] || "").trim();
  const telefone = String(row[1] || "").trim();
  const email = String(row[2] || "").trim();
  return { nome, telefone, email };
}
function makeLeadDoc(base){
  return {
    nome: base.nome || "",
    telefone: base.telefone || "",
    email: base.email || "",
    status: "fila",
    corretorId: null,

    criadoEm: nowMs(),
    atualizadoEm: nowMs(),

    emAtendimentoEm: null,
    timestampDistribuicao: null,
    timestampFinalizacao: null,

    atendeu: null,
    resultado: null,
    observacao: null,
    dataAgendada: null,

    totalTentativas: 0,

    origem: null,        // geral | gerente | corretor
    equipe: null,        // string
    donoUpload: null,    // uid
    listaRef: null       // id da lista
  };
}

async function uploadLeadsFromFile({ file, origem, equipe, donoUploadUid, distribuirGeralAgora }){
  const arrayBuffer = await file.arrayBuffer();
  const workbook = XLSX.read(arrayBuffer, { type: "array" });
  const rows = parseSheetRows(workbook);
  if(rows.length === 0) throw new Error("Planilha vazia.");

  const headerIndex = detectHeaderRow(rows);
  const dataRows = rows.slice(headerIndex + 1);

  const parsed = [];
  for(const r of dataRows){
    const lead = mapLeadColumns(r);
    if(!lead.nome && !lead.telefone && !lead.email) continue;
    if(!lead.telefone) continue;
    parsed.push(lead);
  }
  if(parsed.length === 0) throw new Error("Nenhum lead válido (verifique colunas A/B/C).");

  // cria doc lista
  const listaDoc = await db.collection("listas").add({
    origem,
    equipe: equipe || null,
    donoUpload: donoUploadUid,
    arquivoNome: file.name,
    total: parsed.length,
    criadoEm: nowMs()
  });
  const listaRefId = listaDoc.id;

  // corretores ativos (para distribuição geral)
  let corretoresAtivos = [];
  if(origem === "geral" && distribuirGeralAgora){
    const snap = await db.collection("users")
      .where("role","==","corretor")
      .where("ativo","==",true)
      .where("aprovado","==",true)
      .get();
    corretoresAtivos = snap.docs.map(d => ({ uid: d.id, ...d.data() }));
    if(corretoresAtivos.length === 0){
      throw new Error("Nenhum corretor ATIVO no momento. Peça para os corretores clicarem 'ESTOU ATIVO' antes do upload da lista geral.");
    }
  }

  const batchSize = 400;
  let idx = 0;

  while(idx < parsed.length){
    const batch = db.batch();
    const slice = parsed.slice(idx, idx + batchSize);

    for(const leadBase of slice){
      const docRef = db.collection("leads").doc();
      const doc = makeLeadDoc(leadBase);

      doc.origem = origem;
      doc.equipe = equipe || null;
      doc.donoUpload = donoUploadUid;
      doc.listaRef = listaRefId;

      // distribuição no upload (geral)
      if(origem === "geral" && distribuirGeralAgora){
        const chosen = corretoresAtivos[Math.floor(Math.random() * corretoresAtivos.length)];
        doc.corretorId = chosen.uid;
        doc.status = "fila";
      }

      batch.set(docRef, doc);
    }

    await batch.commit();
    idx += batchSize;
  }

  return { total: parsed.length, listaRefId };
}

/* =========================
   Seleção de leads (anti-repetição)
   ========================= */
function rememberLead(id){
  recentlySeen.unshift(id);
  if(recentlySeen.length > RECENTLY_MAX) recentlySeen.pop();
}

function isRecentlySeen(id){
  return recentlySeen.includes(id);
}

async function pickNextLeadForCorretor({ source, corretorUid, equipeCorretor }){
  let q = db.collection("leads").where("status","==","fila");

  if(source === "geral"){
    q = q.where("origem","==","geral").where("corretorId","==",corretorUid);
  }else if(source === "gerente"){
    q = q.where("origem","==","gerente").where("equipe","==",equipeCorretor).where("corretorId","==",null);
  }else{
    q = q.where("origem","==","corretor").where("donoUpload","==",corretorUid).where("corretorId","==",null);
  }

  // pega um pequeno lote e escolhe aleatoriamente (evita repetição local)
  const snap = await q.limit(12).get();
  if(snap.empty) return null;

  const candidates = snap.docs
    .filter(d => d && d.id && !isRecentlySeen(d.id));

  const chosenDoc = (candidates.length ? candidates : snap.docs)[Math.floor(Math.random() * (candidates.length ? candidates.length : snap.docs.length))];

  const ref = chosenDoc.ref;

  await ref.update({
    status: "em atendimento",
    corretorId: corretorUid,
    emAtendimentoEm: nowMs(),
    timestampDistribuicao: nowMs(),
    atualizadoEm: nowMs(),
    totalTentativas: firebase.firestore.FieldValue.increment(1)
  });

  const fresh = await ref.get();
  const data = fresh.data();
  return { ref, id: fresh.id, data };
}

/* =========================
   Rankings (TOP 5 Empresa e Equipe)
   ========================= */
async function computeTop5({ startMs, endMs, equipeFilter=null }){
  let q = db.collection("leads")
    .where("atendeu","==",true)
    .where("timestampFinalizacao",">=",startMs)
    .where("timestampFinalizacao","<=",endMs);

  if(equipeFilter){
    q = q.where("equipe","==",equipeFilter);
  }

  const snap = await q.get();
  const points = {};
  const counts = {};
  const ags = {};
  const prs = {};

  snap.forEach(ds=>{
    const d = ds.data();
    const uid = d.corretorId;
    if(!uid) return;
    const p = scoreByResultado(d.resultado);
    points[uid] = (points[uid]||0) + p;
    counts[uid] = (counts[uid]||0) + 1;
    if(d.resultado === "AGENDAMENTO") ags[uid] = (ags[uid]||0)+1;
    if(d.resultado === "PROMESSA DOCUMENTAÇÃO") prs[uid] = (prs[uid]||0)+1;
  });

  const sorted = Object.entries(points)
    .sort((a,b)=> b[1]-a[1])
    .slice(0,5)
    .map(([uid, pts], idx)=>({
      pos: idx+1,
      uid,
      pts,
      atendidos: counts[uid]||0,
      agendamentos: ags[uid]||0,
      promessas: prs[uid]||0
    }));

  return sorted;
}

async function hydrateNames(uids){
  const names = {};
  if(!uids.length) return names;

  const reads = uids.map(uid => db.collection("users").doc(uid).get());
  const snaps = await Promise.all(reads);
  snaps.forEach((s, idx)=>{
    const uid = uids[idx];
    if(s.exists){
      const d = s.data()||{};
      names[uid] = d.nomeExibicao || d.nome || d.email || uid;
    }else{
      names[uid] = uid;
    }
  });
  return names;
}

async function queryMiniCrmDocs(userData){

    .where("atendeu","==",true)

/* =========================
   Resultados / KPIs
   ========================= */
async function computeKpis({ userData, startMs, endMs }){
  let q = db.collection("leads")
    .where("timestampDistribuicao",">=",startMs)
    .where("timestampDistribuicao","<=",endMs);

  if(userData.role === "corretor"){
    q = q.where("corretorId","==",auth.currentUser.uid);
  }else if(userData.role === "gerente"){
    q = q.where("equipe","==",(userData.equipe||"equipe1"));
  }

  const snap = await q.get();

  let totalLig = 0;
  let naoAt = 0;
  let atendidos = 0;
  let ag = 0;
  let pr = 0;
  let sem = 0;
  let pontos = 0;

  const rows = [];

  snap.forEach(ds=>{
    const d = ds.data();
    totalLig += 1;

    if(d.atendeu === false) naoAt += 1;

    if(d.atendeu === true && d.timestampFinalizacao && d.timestampFinalizacao >= startMs && d.timestampFinalizacao <= endMs){
      atendidos += 1;
      if(d.resultado === "AGENDAMENTO") ag += 1;
      else if(d.resultado === "PROMESSA DOCUMENTAÇÃO") pr += 1;
      else if(d.resultado === "NÃO GEROU INTERESSE") sem += 1;

      pontos += scoreByResultado(d.resultado);

      rows.push({
        Cliente: d.nome || "",
        Telefone: d.telefone || "",
        Email: d.email || "",
        Resultado: d.resultado || "",
        "Data/Hora Agendada": d.dataAgendada || "",
        Feedback: d.observacao || "",
        "CorretorId": d.corretorId || "",
        "Equipe": d.equipe || "",
        "Distribuído em": d.timestampDistribuicao ? new Date(d.timestampDistribuicao).toLocaleString() : "",
        "Finalizado em": d.timestampFinalizacao ? new Date(d.timestampFinalizacao).toLocaleString() : "",
      });
    }
  });

  const taxaAtendimento = totalLig ? Math.round((atendidos/totalLig)*100) : 0;
  const conv = atendidos ? Math.round(((ag+pr)/atendidos)*100) : 0;

  return {
    totalLig, naoAt, atendidos, ag, pr, sem, pontos, taxaAtendimento, conv, rows
  };
}

    const rows = data.rows;

        <div class="card">
          <div class="muted small">Sem atendidos finalizados nesse período (para sua permissão).</div>
        </div>
      `;

    }

    const showCorretor = (currentUserData.role !== "corretor");

    const cols = [
      "Cliente","Telefone","Email","Resultado","Data/Hora Agendada","Feedback",
      ...(showCorretor ? ["CorretorId","Equipe"] : []),
      "Distribuído em","Finalizado em"
    ];

    let th = cols.map(c=>`<th>${escapeHtml(c)}</th>`).join("");
    let body = rows.map(r=>{
      return `<tr>${cols.map(c=>`<td>${escapeHtml(r[c]||"")}</td>`).join("")}</tr>`;
    }).join("");

    $("resTabela").innerHTML = `

          <div class="pill">Tabela</div>

            <thead><tr>${th}</tr></thead>
            <tbody>${body}</tbody>

        </div>
      </div>
    `;

    window.__resRows = rows;
  }catch(e){

  }

async function exportExcelResultados(){
  try{
    const rows = window.__resRows || [];
    const de = $("resDe")?.value || dayKeyFromMs(nowMs());
    const ate = $("resAte")?.value || dayKeyFromMs(nowMs());
    if(!rows.length){
      return alert("Sem linhas de atendidos para exportar no período selecionado.");
    }

    const startMs = startOfDayMs(de);
    const endMs = endOfDayMs(ate);
    const data = await computeKpis({userData: currentUserData, startMs, endMs});

    const tempoLogadoMin = loginTimestamp ? Math.max(0, Math.floor((nowMs()-loginTimestamp)/60000)) : 0;

    const resumo = [
      ["Relatório PROEFI - ALVENA", ""],
      ["Role", currentUserData.role],
      ["Email", auth.currentUser.email],
      ["Equipe", currentUserData.equipe || ""],
      ["Período", `${de} até ${ate}`],
      ["Tempo logado (min)", tempoLogadoMin],
      ["Total ligações (tentativas)", data.totalLig],
      ["Não atendeu", data.naoAt],
      ["Atendidos", data.atendidos],
      ["Agendamentos", data.ag],
      ["Promessas", data.pr],
      ["Não gerou interesse", data.sem],
      ["Pontos", data.pontos],
      ["Taxa de atendimento", data.taxaAtendimento+"%"],
      ["Conversão", data.conv+"%"],
      ["Gerado em", new Date().toLocaleString()]
    ];

    const wsResumo = XLSX.utils.aoa_to_sheet(resumo);
    const wsRows = XLSX.utils.json_to_sheet(rows);

    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, wsResumo, "Resumo");
    XLSX.utils.book_append_sheet(wb, wsRows, "Atendidos");

    XLSX.writeFile(wb, `PROEFI_RESULTADOS_${de}_A_${ate}.xlsx`);
    alert("Excel gerado com sucesso!");
  }catch(e){
    alert(e.message || String(e));
  }
}

    box.innerHTML = "";
    return;

  finalMode = mode;
  ["tAg","tPr","tSe"].forEach(id=>$(id)?.classList.remove("toggleBtnOn"));
  (mode==="ag"?$("tAg"):mode==="pr"?$("tPr"):$("tSe"))?.classList.add("toggleBtnOn");

window.confirmarFinalizacao = async function(resultado){
  try{
    if(!leadAtualRef) return;

    let dataAgendada = null;
    let obs = null;

    if(resultado === "AGENDAMENTO"){
      const d = $("agData")?.value;
      const h = $("agHora")?.value;
      if(!d || !h) return alert("Preencha data e horário do agendamento.");
      dataAgendada = `${d} ${h}`;
      obs = ($("obsAg")?.value || "").trim();
    }else if(resultado === "PROMESSA DOCUMENTAÇÃO"){
      obs = ($("obsPr")?.value || "").trim();
    }else{
      const fb = ($("fb")?.value || "").trim();
      if(!fb) return alert("Feedback é obrigatório.");
      obs = fb;

    await leadAtualRef.update({
      status: "finalizado",
      atendeu: true,
      resultado,
      observacao: obs || null,
      dataAgendada: dataAgendada,
      timestampFinalizacao: nowMs(),
      atualizadoEm: nowMs()
    });

    if(resultado === "AGENDAMENTO" || resultado === "PROMESSA DOCUMENTAÇÃO"){

    leadAtualData = null;
    leadAtualId = null;

    $("leadArea").innerHTML = `<div class="center ok">Atendimento finalizado! Buscando outro...</div>`;

/* =========================
   Render App principal
   ========================= */
async function renderApp(user, userData){
  const role = userData.role;
  setTabsForRole(role);

  let extra = "";
  if(role === "corretor") extra = activeBadge(!!userData.ativo);
  if(role === "gerente") extra = `<span class="pill">Equipe: ${escapeHtml(userData.equipe||"equipe1")}</span>`;
  if(role === "diretor") extra = `<span class="pill">Diretoria</span>`;

  let html = renderHeader(user.email, role, extra);

  if(currentTab === "result"){
    html += await renderTop5Cards(userData);
    html += await renderResultados(userData);
    setTimeout(()=>loadResultados(), 50);
    $("app").innerHTML = html;
    return;
  }

  if(currentTab === "mini"){
    html += await renderMiniCrm(user, userData);
    $("app").innerHTML = html;
    return;
  }

  if(currentTab === "config"){
    if(role === "corretor"){
      html += await renderCorretorConfig(user, userData);
    }else if(role === "gerente"){
      html += renderGerenteConfig(user, userData);
      html += await renderGerenteApprovalsCard(userData);
      setTimeout(()=>loadApprovals(), 60);
    }else{
      html += renderDiretorConfig(user, userData);
      setTimeout(()=>loadApprovals(), 60);
    }
    $("app").innerHTML = html;
    return;
  }

  if(currentTab === "atend" && role === "corretor"){
    html += renderCorretorAtendimento(user, userData);
    $("app").innerHTML = html;
    return;
  }

  if(role === "corretor"){
    html += await renderCorretorPainel(user, userData);
  }else if(role === "gerente"){
    html += renderGerentePainel(user, userData);
    html += await renderTop5Cards(userData);
    setTimeout(()=>refreshGerenteKpis(), 60);
  }else{
    html += renderDiretorPainel(user, userData);
    html += await renderTop5Cards(userData);
    setTimeout(()=>refreshDiretorKpis(), 60);
  }

  $("app").innerHTML = html;
}

window.doLogin = async function(){

  if(!email || !senha) return alert("Preencha email e senha.");

    await auth.signInWithEmailAndPassword(email, senha);
  }catch(e){
    alert(e.message || String(e));
  }
};

window.doRegister = async function(){
  const email = ($("email")?.value || "").trim();
  const senha = $("senha")?.value || "";
  if(!email || !senha) return alert("Preencha email e senha.");
  try{
    const cred = await auth.createUserWithEmailAndPassword(email, senha);

    await db.collection("users").doc(cred.user.uid).set({
      email,
      role: "corretor",
      aprovado: false,
      ativo: false,
      equipe: "equipe1",
      criadoEm: nowMs(),
      atualizadoEm: nowMs()
    });

    alert("Acesso criado e aguardando aprovação do gestor/diretor.");
    await auth.signOut();
    renderLogin();
  }catch(e){
    if(String(e.code||"").includes("auth/email-already-in-use")){
      try{
        await auth.signInWithEmailAndPassword(email, senha);
        const user = auth.currentUser;
        const snap = await db.collection("users").doc(user.uid).get();
        if(!snap.exists){
          alert("Email existe no Auth, mas não existe no banco 'users'. Peça ao diretor para corrigir o cadastro.");
          await auth.signOut();
          return;
        }
        const data = snap.data()||{};
        if(!data.aprovado){
          alert("Acesso já existe e está pendente. Aguarde aprovação.");
          await auth.signOut();
          renderLogin();
          return;
        }
        alert("Este acesso já existe e já está aprovado. Faça login normalmente.");
        await auth.signOut();
        renderLogin();
      }catch(err){
        alert("Email já existe. Se estiver pendente, aguarde aprovação. Se já aprovado, verifique a senha.");
      }
      return;
    }
    alert(e.message || String(e));
  }
};

/* =========================
   Bootstrap
   ========================= */
auth.onAuthStateChanged(async (user)=>{
  if(!user){
    currentUserData = null;
    currentTab = "painel";
    leadAtualRef = null;
    leadAtualData = null;
    leadAtualId = null;
    detailsOpen = false;
    loginTimestamp = null;
    renderLogin();
    return;
  }

  await ensureUserDocForDirector(user);

  const userSnap = await db.collection("users").doc(user.uid).get();
  if(!userSnap.exists){
    renderUnauthorized();
    return;
  }

  const data = userSnap.data() || {};

  if(user.email === DIRECTOR_CREATOR_EMAIL){
    data.role = "diretor";
    data.aprovado = true;
  }

  if(data.aprovado !== true){
    renderWaitingApproval();
    return;
  }

  currentUserData = data;

  if(loginTimestamp === null) loginTimestamp = nowMs();

  if(data.role !== "corretor" && currentTab === "atend") currentTab = "painel";

  await renderApp(user, data);
});
</script>
